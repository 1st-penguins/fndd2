<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿠폰 관리 | 퍼스트펭귄</title>
  <link rel="canonical" href="https://the1stpeng.com/admin/coupons.html" />
  
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/apple-header.css">

  <script type="module" src="../js/core/firebase-core.js"></script>
  <script type="module" src="../js/auth/auth-core.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }

    .main-content {
      max-width: 1400px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--penguin-navy);
      color: white;
    }

    .btn-primary:hover {
      background: var(--penguin-skyblue);
      transform: translateY(-2px);
    }

    .btn-success {
      background: #37b24d;
      color: white;
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .coupons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .coupon-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .coupon-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--penguin-navy), var(--penguin-skyblue));
    }

    .coupon-code {
      font-size: 24px;
      font-weight: bold;
      color: var(--penguin-navy);
      margin-bottom: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .coupon-discount {
      font-size: 18px;
      color: #ff6b6b;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .coupon-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      color: #666;
    }

    .coupon-info-item {
      display: flex;
      justify-content: space-between;
    }

    .coupon-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .status-active {
      background: #d4edda;
      color: #155724;
    }

    .status-expired {
      background: #f8d7da;
      color: #721c24;
    }

    .coupon-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .modal-header h2 {
      color: var(--penguin-navy);
      font-size: 24px;
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #999;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--penguin-skyblue);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .help-text {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .generate-btn {
      background: #fcc419;
      color: #333;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 5px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 12px;
    }

    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .coupons-grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    <a href="../index.html" class="header__brand">
      <img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄" class="header__logo">

  <div class="header__mobile-menu" id="mobile-menu">
    <a href="../notices.html" class="header__mobile-link">공지사항</a>

    <a href="../si1.html" class="header__mobile-link">1급 스포츠지도사</a>

    <a href="coupons.html" class="admin-subnav__link admin-subnav__link--active">쿠폰관리</a>

  <main class="main-content">
    <!-- 액션 바 -->
    <div class="action-bar">
      <div>
        <h2 style="color: var(--penguin-navy); margin: 0;">쿠폰 목록</h2>
        <p style="color: #666; font-size: 14px; margin-top: 5px;">할인 쿠폰을 생성하고 관리하세요</p>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">
        ➕ 쿠폰 생성
      </button>
    </div>

    <!-- 쿠폰 목록 -->
    <div id="coupons-container">
      <div class="empty-state">
        <div class="icon">🎟️</div>
        <p style="color: #999;">생성된 쿠폰이 없습니다.</p>
        <button class="btn btn-primary" onclick="openCreateModal()" style="margin-top: 20px;">
          첫 쿠폰 만들기
        </button>
      </div>
    </div>
  </main>

  <!-- 쿠폰 생성/수정 모달 -->
  <div id="coupon-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">새 쿠폰 생성</h2>
        <button class="close-modal" onclick="closeModal()">×</button>
      </div>

      <form id="coupon-form">
        <input type="hidden" id="coupon-id">

        <!-- 쿠폰 코드 -->
        <div class="form-group">
          <label for="coupon-code">쿠폰 코드 *</label>
          <input type="text" id="coupon-code" placeholder="WELCOME2025" required>
          <button type="button" class="generate-btn" onclick="generateCouponCode()">
            🎲 랜덤 생성
          </button>
          <div class="help-text">영문 대문자와 숫자만 사용 (예: SAVE50, FIRST2025)</div>
        </div>

        <!-- 할인 타입 & 할인 값 -->
        <div class="form-row">
          <div class="form-group">
            <label for="discount-type">할인 타입 *</label>
            <select id="discount-type" required onchange="updateDiscountLabel()">
              <option value="percent">할인율 (%)</option>
              <option value="fixed">할인 금액 (원)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="discount-value" id="discount-value-label">할인 값 *</label>
            <input type="number" id="discount-value" placeholder="10" min="1" required>
          </div>
        </div>

        <!-- 최소 구매 금액 & 최대 할인 금액 -->
        <div class="form-row">
          <div class="form-group">
            <label for="min-purchase">최소 구매 금액 (원)</label>
            <input type="number" id="min-purchase" placeholder="0" min="0" value="0">
            <div class="help-text">0 = 제한 없음</div>
          </div>
          <div class="form-group">
            <label for="max-discount">최대 할인 금액 (원)</label>
            <input type="number" id="max-discount" placeholder="0" min="0" value="0">
            <div class="help-text">0 = 제한 없음 (정률 할인 시)</div>
          </div>
        </div>

        <!-- 유효기간 -->
        <div class="form-row">
          <div class="form-group">
            <label for="start-date">시작일 *</label>
            <input type="datetime-local" id="start-date" required>
          </div>
          <div class="form-group">
            <label for="end-date">종료일 *</label>
            <input type="datetime-local" id="end-date" required>
          </div>
        </div>

        <!-- 사용 횟수 제한 -->
        <div class="form-row">
          <div class="form-group">
            <label for="max-uses">최대 사용 횟수</label>
            <input type="number" id="max-uses" placeholder="100" min="0" value="0">
            <div class="help-text">0 = 무제한</div>
          </div>
          <div class="form-group">
            <label for="max-uses-per-user">1인당 사용 횟수</label>
            <input type="number" id="max-uses-per-user" placeholder="1" min="1" value="1">
          </div>
        </div>

        <!-- 적용 상품 -->
        <div class="form-group">
          <label for="applicable-products">적용 상품</label>
          <select id="applicable-products" multiple size="12" style="height: auto;">
            <option value="all" selected>전체 상품</option>
            <optgroup label="정규강의 (동영상)">
              <option value="video_anatomy">기능해부학 정규강의</option>
              <option value="video_injury">운동상해 정규강의</option>
              <option value="video_physio">운동생리학 정규강의</option>
              <option value="video_load">운동부하검사 정규강의</option>
              <option value="video_ecg">심전도 특별강의</option>
              <option value="video_patho">병태생리학 정규강의</option>
              <option value="video_prescript">운동처방론 정규강의</option>
              <option value="video_health">건강체력평가 정규강의</option>
            </optgroup>
            <optgroup label="요약본 (PDF)">
              <option value="pdf_anatomy">기능해부학 요약본</option>
              <option value="pdf_injury">운동상해 요약본</option>
              <option value="pdf_physio">운동생리학 요약본</option>
              <option value="pdf_load">운동부하검사 요약본</option>
              <option value="pdf_patho">병태생리학 요약본</option>
              <option value="pdf_psycho">스포츠심리학 요약본</option>
              <option value="pdf_prescript">운동처방론 요약본</option>
              <option value="pdf_health">건강체력평가 요약본</option>
            </optgroup>
            <optgroup label="레거시 상품">
              <option value="pdf_001">NSCA-CSCS 요약정리본</option>
              <option value="pdf_002">운동생리학 요약본 (구)</option>
              <option value="pdf_003">병태생리학 압축요약본 (구)</option>
              <option value="pdf_004">기능해부학 상지 요약본 (구)</option>
              <option value="pdf_005">운동처방론 요약정리본 (구)</option>
            </optgroup>
          </select>
          <div class="help-text">Ctrl/Cmd 클릭으로 여러 개 선택 가능</div>
        </div>

        <!-- 쿠폰 설명 -->
        <div class="form-group">
          <label for="coupon-description">설명 (선택)</label>
          <textarea id="coupon-description" rows="3" placeholder="신규 회원 환영 쿠폰"></textarea>
        </div>

        <!-- 버튼 -->
        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 30px;">
          <button type="button" class="btn" onclick="closeModal()" style="background: #e9ecef; color: #333;">
            취소
          </button>
          <button type="submit" class="btn btn-primary">
            저장
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { ensureFirebase, ensureAuthReady } from '../js/core/firebase-core.js';
    import { isAdmin } from '../js/auth/auth-utils.js';
    import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    const { auth, db } = await ensureFirebase();

    // 관리자 권한 확인
    const user = await ensureAuthReady();
    if (!user || !isAdmin(user)) {
      alert('관리자 권한이 필요합니다.');
      window.location.href = '../index.html';
    }

    await loadCoupons();
    
    // 쿠폰 로드
    async function loadCoupons() {
      try {
        const couponsRef = collection(db, 'coupons');
        const q = query(couponsRef, orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
          document.getElementById('coupons-container').innerHTML = `
            <div class="empty-state">
              <div class="icon">🎟️</div>
              <p style="color: #999;">생성된 쿠폰이 없습니다.</p>
              <button class="btn btn-primary" onclick="openCreateModal()" style="margin-top: 20px;">
                첫 쿠폰 만들기
              </button>
            </div>
          `;
          return;
        }
        
        const coupons = [];
        snapshot.forEach(doc => {
          coupons.push({ id: doc.id, ...doc.data() });
        });
        
        renderCoupons(coupons);
      } catch (error) {
        console.error('쿠폰 로드 오류:', error);
        alert('쿠폰을 불러오는 중 오류가 발생했습니다.');
      }
    }
    
    // 쿠폰 렌더링
    function renderCoupons(coupons) {
      const now = new Date();
      
      const html = coupons.map(coupon => {
        const startDate = coupon.startDate?.toDate();
        const endDate = coupon.endDate?.toDate();
        const isActive = now >= startDate && now <= endDate;
        const status = isActive ? 'active' : 'expired';
        const statusText = isActive ? '활성' : '만료';
        
        const discountText = coupon.discountType === 'percent' 
          ? `${coupon.discountValue}% 할인`
          : `${coupon.discountValue.toLocaleString()}원 할인`;
        
        const usageText = coupon.maxUses > 0 
          ? `${coupon.usedCount || 0} / ${coupon.maxUses}회`
          : `${coupon.usedCount || 0}회 사용`;
        
        const applicableText = coupon.applicableProducts.includes('all')
          ? '전체 상품'
          : `${coupon.applicableProducts.length}개 상품`;
        
        return `
          <div class="coupon-card">
            <span class="coupon-status status-${status}">${statusText}</span>
            <div class="coupon-code">${coupon.code}</div>
            <div class="coupon-discount">${discountText}</div>
            <div class="coupon-info">
              <div class="coupon-info-item">
                <span>📦 적용 상품:</span>
                <span>${applicableText}</span>
              </div>
              <div class="coupon-info-item">
                <span>📊 사용 현황:</span>
                <span>${usageText}</span>
              </div>
              <div class="coupon-info-item">
                <span>📅 기간:</span>
                <span>${startDate.toLocaleDateString('ko-KR')} ~ ${endDate.toLocaleDateString('ko-KR')}</span>
              </div>
              ${coupon.minPurchase > 0 ? `
              <div class="coupon-info-item">
                <span>💰 최소금액:</span>
                <span>${coupon.minPurchase.toLocaleString()}원</span>
              </div>
              ` : ''}
            </div>
            ${coupon.description ? `<p style="color: #999; font-size: 13px; margin-bottom: 15px;">${coupon.description}</p>` : ''}
            <div class="coupon-actions">
              <button class="btn btn-sm" onclick="copyCouponCode('${coupon.code}')" style="background: var(--penguin-skyblue); color: white;">
                📋 복사
              </button>
              <button class="btn btn-danger btn-sm" onclick="deleteCoupon('${coupon.id}', '${coupon.code}')">
                🗑️ 삭제
              </button>
            </div>
          </div>
        `;
      }).join('');
      
      document.getElementById('coupons-container').innerHTML = `
        <div class="coupons-grid">${html}</div>
      `;
    }
    
    // 쿠폰 코드 복사
    window.copyCouponCode = function(code) {
      navigator.clipboard.writeText(code).then(() => {
        alert(`쿠폰 코드 "${code}"가 복사되었습니다!`);
      });
    };
    
    // 쿠폰 삭제
    window.deleteCoupon = async function(couponId, code) {
      if (!confirm(`쿠폰 "${code}"를 삭제하시겠습니까?`)) return;
      
      try {
        await deleteDoc(doc(db, 'coupons', couponId));
        alert('쿠폰이 삭제되었습니다.');
        await loadCoupons();
      } catch (error) {
        console.error('쿠폰 삭제 오류:', error);
        alert('쿠폰 삭제 중 오류가 발생했습니다.');
      }
    };
    
    // 모달 열기
    window.openCreateModal = function() {
      document.getElementById('modal-title').textContent = '새 쿠폰 생성';
      document.getElementById('coupon-form').reset();
      document.getElementById('coupon-id').value = '';
      
      // 기본값 설정
      const now = new Date();
      const startDate = now.toISOString().slice(0, 16);
      const endDate = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000).toISOString().slice(0, 16);
      document.getElementById('start-date').value = startDate;
      document.getElementById('end-date').value = endDate;
      
      document.getElementById('coupon-modal').classList.add('active');
    };
    
    // 모달 닫기
    window.closeModal = function() {
      document.getElementById('coupon-modal').classList.remove('active');
    };
    
    // 쿠폰 코드 생성
    window.generateCouponCode = function() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = '';
      for (let i = 0; i < 8; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById('coupon-code').value = code;
    };
    
    // 할인 값 라벨 업데이트
    window.updateDiscountLabel = function() {
      const type = document.getElementById('discount-type').value;
      const label = type === 'percent' ? '할인율 (%) *' : '할인 금액 (원) *';
      document.getElementById('discount-value-label').textContent = label;
    };
    
    // 쿠폰 저장
    document.getElementById('coupon-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = document.getElementById('coupon-code').value.trim().toUpperCase();
      const discountType = document.getElementById('discount-type').value;
      const discountValue = parseInt(document.getElementById('discount-value').value);
      const minPurchase = parseInt(document.getElementById('min-purchase').value) || 0;
      const maxDiscount = parseInt(document.getElementById('max-discount').value) || 0;
      const startDate = new Date(document.getElementById('start-date').value);
      const endDate = new Date(document.getElementById('end-date').value);
      const maxUses = parseInt(document.getElementById('max-uses').value) || 0;
      const maxUsesPerUser = parseInt(document.getElementById('max-uses-per-user').value) || 1;
      const description = document.getElementById('coupon-description').value.trim();
      
      // 적용 상품
      const productSelect = document.getElementById('applicable-products');
      const selectedProducts = Array.from(productSelect.selectedOptions).map(opt => opt.value);
      
      // 유효성 검사
      if (discountType === 'percent' && (discountValue < 1 || discountValue > 100)) {
        alert('할인율은 1~100% 사이여야 합니다.');
        return;
      }
      
      if (endDate <= startDate) {
        alert('종료일은 시작일보다 나중이어야 합니다.');
        return;
      }
      
      try {
        const couponData = {
          code: code,
          discountType: discountType,
          discountValue: discountValue,
          minPurchase: minPurchase,
          maxDiscount: maxDiscount,
          startDate: startDate,
          endDate: endDate,
          maxUses: maxUses,
          maxUsesPerUser: maxUsesPerUser,
          applicableProducts: selectedProducts,
          description: description,
          usedCount: 0,
          createdAt: serverTimestamp(),
          createdBy: auth.currentUser.uid
        };
        
        await addDoc(collection(db, 'coupons'), couponData);
        
        alert('쿠폰이 생성되었습니다!');
        closeModal();
        await loadCoupons();
      } catch (error) {
        console.error('쿠폰 생성 오류:', error);
        alert('쿠폰 생성 중 오류가 발생했습니다.');
      }
    });
    
    // 전역 함수 노출
    window.loadCoupons = loadCoupons;
  </script>
<script src="../js/apple-header.js"></script>
</body>
</html>
