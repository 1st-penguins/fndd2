<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 관리 | 퍼스트펭귄</title>
  <link rel="canonical" href="https://the1stpeng.com/admin/notices.html" />
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/apple-header.css">
  <script type="module" src="../js/core/firebase-core.js"></script>
  <script type="module" src="../js/auth/auth-core.js"></script>
  <script type="module" src="../js/auth/auth-utils.js"></script>
  <script type="module" src="../js/data/notice-repository.js"></script>
  <script type="module" src="../js/admin/notices-admin.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f4f6f9;
      color: #212529;
      min-height: 100vh;
    }

    /* 토스트 알림 */
    #toast {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      background: #212529; color: white;
      padding: 12px 20px; border-radius: 8px;
      font-size: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #2b8a3e; }
    #toast.error { background: #c92a2a; }

    /* 레이아웃 */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      min-height: calc(100vh - 88px);
    }

    /* 좌측 패널 - 작성/수정 폼 */
    .panel-form {
      background: white;
      border-right: 1px solid #e9ecef;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: sticky;
      top: 0;
      height: calc(100vh - 88px);
      overflow-y: auto;
    }
    .panel-form h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--penguin-navy, #1D2F4E);
      padding-bottom: 12px;
      border-bottom: 2px solid #f1f3f5;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #495057; }
    .form-group input[type="text"],
    .form-group select,
    .form-group textarea {
      padding: 9px 12px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--penguin-skyblue, #5FB2C9);
    }
    .form-group textarea { min-height: 180px; resize: vertical; }

    /* 고정 토글 */
    .pin-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
    }
    .pin-toggle-wrap:hover { background: #f8f9fa; }
    .toggle-switch {
      width: 40px; height: 22px;
      background: #dee2e6;
      border-radius: 999px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    #notice-pinned:checked + .pin-toggle-wrap .toggle-switch { background: var(--penguin-navy, #1D2F4E); }
    #notice-pinned:checked + .pin-toggle-wrap .toggle-switch::after { transform: translateX(18px); }
    #notice-pinned { display: none; }

    /* 에디터 툴바 */
    .editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px 8px 0 0;
      border: 1px solid #dee2e6;
      border-bottom: none;
    }
    .editor-btn {
      padding: 4px 9px;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .editor-btn:hover { background: #e9ecef; }
    #notice-content { border-radius: 0 0 8px 8px; }

    /* 미리보기 */
    .preview-box {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px;
      min-height: 80px;
      font-size: 14px;
      line-height: 1.7;
      background: #fafafa;
      color: #495057;
    }

    /* 폼 버튼 */
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-publish { background: var(--penguin-navy, #1D2F4E); color: white; flex: 1; }
    .btn-publish:hover:not(:disabled) { background: #162340; }
    .btn-draft { background: #e9ecef; color: #495057; }
    .btn-draft:hover:not(:disabled) { background: #dee2e6; }
    .btn-reset { background: transparent; color: #868e96; padding: 10px 12px; }
    .btn-reset:hover { color: #495057; }

    /* 우측 패널 - 목록 */
    .panel-list { padding: 24px; overflow-y: auto; }
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .list-header h2 { font-size: 16px; font-weight: 700; color: var(--penguin-navy, #1D2F4E); }
    .list-actions { display: flex; gap: 8px; align-items: center; }
    .filter-select {
      padding: 7px 10px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
    }
    .btn-refresh {
      padding: 7px 14px;
      background: #f1f3f5;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    .btn-refresh:hover { background: #e9ecef; }

    /* 공지 카드 목록 */
    .notice-cards { display: flex; flex-direction: column; gap: 8px; }
    .notice-card {
      background: white;
      border: 1px solid #e9ecef;
      border-radius: 10px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .notice-card.is-pinned { border-left: 3px solid var(--penguin-navy, #1D2F4E); }
    .notice-card.is-draft { background: #f8f9fa; opacity: 0.8; }

    .card-main { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #212529;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-date { font-size: 12px; color: #868e96; }
    .card-view { font-size: 11px; color: #adb5bd; }

    /* 상태/배지 뱃지 */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-draft { background: #e9ecef; color: #495057; }
    .badge-published { background: #d3f9d8; color: #2b8a3e; }
    .badge-신규 { background: #ffe3e3; color: #c92a2a; }
    .badge-중요 { background: #fff3bf; color: #e67700; }
    .badge-강의예정 { background: #d3f9d8; color: #2b8a3e; }
    .badge-강의종료 { background: #e9ecef; color: #495057; }
    .badge-행사 { background: #f3d9fa; color: #7950f2; }
    .badge-안내 { background: #d0ebff; color: #1971c2; }
    .badge-업데이트 { background: #d3f9d8; color: #2b8a3e; }
    .badge-FAQ { background: #e8f4fd; color: #1864ab; }
    .badge-가이드 { background: #e6fcf5; color: #087f5b; }
    .badge-공지 { background: #d0ebff; color: #1971c2; }

    /* 카드 오른쪽 컨트롤 */
    .card-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* 인라인 고정 토글 */
    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      opacity: 0.3;
      transition: opacity 0.15s, transform 0.15s;
      padding: 4px;
      line-height: 1;
    }
    .pin-btn:hover { opacity: 0.7; transform: scale(1.1); }
    .pin-btn.pinned { opacity: 1; }

    /* 카드 액션 버튼 */
    .card-btn {
      padding: 5px 12px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .card-btn:hover { background: #f1f3f5; }
    .card-btn.edit { color: var(--penguin-navy, #1D2F4E); }
    .card-btn.publish { color: #2b8a3e; border-color: #8ce99a; }
    .card-btn.publish:hover { background: #d3f9d8; }
    .card-btn.delete { color: #c92a2a; border-color: #ffc9c9; }
    .card-btn.delete:hover { background: #fff5f5; }

    .loading-text { text-align: center; padding: 40px; color: #868e96; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .panel-form { position: static; height: auto; }
    }
  </style>
</head>
<body class="admin-page">
  <header class="header" id="header">
    <a href="../index.html" class="header__brand">
      <img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄" class="header__logo">
      <span class="header__name">퍼스트펭귄</span>
    </a>
    <nav class="header__nav">
      <a href="../notices.html" class="header__nav-link">공지사항</a>
      <a href="../cft.html" class="header__nav-link header__nav-link--cert">건강운동관리사</a>
      <a href="../si1.html" class="header__nav-link header__nav-link--cert">1급 스포츠지도사</a>
      <a href="../si2.html" class="header__nav-link header__nav-link--cert">2급 스포츠지도사</a>
    </nav>
    <div class="header__right">
      <a href="#" class="header__login" id="header-login-btn">로그인</a>
      <button class="header__hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>
  <div class="header__mobile-menu" id="mobile-menu">
    <a href="../notices.html" class="header__mobile-link">공지사항</a>
    <a href="../cft.html" class="header__mobile-link">건강운동관리사</a>
    <a href="../si1.html" class="header__mobile-link">1급 스포츠지도사</a>
    <a href="../si2.html" class="header__mobile-link">2급 스포츠지도사</a>
    <div class="header__menu-divider"></div>
    <div class="header__menu-auth" id="menu-auth"></div>
  </div>
  <nav class="admin-subnav">
    <a href="dashboard.html" class="admin-subnav__link">대시보드</a>
    <a href="user-lookup.html" class="admin-subnav__link">사용자 조회</a>
    <a href="analytics.html" class="admin-subnav__link">학습분석</a>
    <a href="notices.html" class="admin-subnav__link admin-subnav__link--active">공지관리</a>
    <a href="coupons.html" class="admin-subnav__link">쿠폰관리</a>
    <a href="statistics.html" class="admin-subnav__link">통계</a>
  </nav>

  <div id="toast"></div>

  <div class="layout">
    <!-- 좌측: 작성/수정 폼 -->
    <aside class="panel-form">
      <h2 id="form-title">새 공지사항 작성</h2>
      <input type="hidden" id="notice-id">

      <div class="form-group">
        <label for="notice-title">제목</label>
        <input type="text" id="notice-title" placeholder="공지 제목을 입력하세요">
      </div>

      <div class="form-group">
        <label for="notice-badge">카테고리</label>
        <select id="notice-badge">
          <option value="">없음</option>
          <option value="공지">공지</option>
          <option value="이벤트">이벤트</option>
          <option value="업데이트">업데이트</option>
        </select>
      </div>

      <div class="form-group">
        <label>상단 고정</label>
        <input type="checkbox" id="notice-pinned">
        <label for="notice-pinned" class="pin-toggle-wrap">
          <div class="toggle-switch"></div>
          <span style="font-size:14px;color:#495057;">상단에 고정</span>
        </label>
      </div>

      <div class="form-group">
        <label>내용</label>
        <div class="editor-toolbar">
          <button type="button" class="editor-btn" data-format="b"><b>B</b></button>
          <button type="button" class="editor-btn" data-format="i"><i>I</i></button>
          <button type="button" class="editor-btn" data-format="h2">H2</button>
          <button type="button" class="editor-btn" data-format="h3">H3</button>
          <button type="button" class="editor-btn" data-format="ul">• 목록</button>
          <button type="button" class="editor-btn" data-format="ol">1. 목록</button>
          <button type="button" class="editor-btn" data-format="hr">─ 구분선</button>
          <button type="button" class="editor-btn" data-format="a">링크</button>
        </div>
        <textarea id="notice-content" placeholder="공지 내용을 입력하세요&#10;&#10;HTML 태그 사용 가능합니다."></textarea>
      </div>

      <div class="form-group">
        <label>미리보기</label>
        <div class="preview-box" id="content-preview"><em style="color:#adb5bd">내용을 입력하면 여기에 미리보기가 표시됩니다.</em></div>
      </div>

      <div class="form-actions">
        <button id="reset-btn" class="btn btn-reset">취소</button>
        <button id="draft-btn" class="btn btn-draft">초안 저장</button>
        <button id="publish-btn" class="btn btn-publish">발행하기</button>
      </div>
    </aside>

    <!-- 우측: 공지 목록 -->
    <main class="panel-list">
      <div class="list-header">
        <h2>공지 목록 <span id="notice-count" style="font-weight:400;color:#868e96;font-size:14px;"></span></h2>
        <div class="list-actions">
          <select id="status-filter" class="filter-select">
            <option value="all">전체</option>
            <option value="published">발행됨</option>
            <option value="draft">초안</option>
          </select>
          <button id="refresh-btn" class="btn-refresh">↻ 새로고침</button>
        </div>
      </div>

      <div id="notices-loading" class="loading-text">공지사항을 불러오는 중...</div>
      <div id="notice-cards" class="notice-cards" style="display:none;"></div>
    </main>
  </div>
<script src="../js/apple-header.js"></script>
</body>
</html>
