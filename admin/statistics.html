<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문제별 통계 | 관리자 | 퍼스트펭귄</title>
  
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  
  <script src="../js/logger.js"></script>
  
  <!-- Firebase -->
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
  
  <script type="module" src="../js/core/firebase-core.js"></script>
  <script type="module" src="../js/auth/auth-core.js"></script>
  <script type="module" src="../js/auth/auth-utils.js"></script>
  
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  
  <style>
    /* 헤더 로고 크기 */
    header .logo img {
      max-width: 50px;
      max-height: 50px;
      object-fit: contain;
    }
    
    .admin-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 20px;
    }
    
    .page-header {
      margin-bottom: 30px;
    }
    
    .page-header h1 {
      color: var(--penguin-navy);
      margin-bottom: 10px;
    }
    
    .filter-section {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .filter-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--penguin-navy);
    }
    
    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
    }
    
    .stats-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .stats-card h2 {
      color: var(--penguin-navy);
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--penguin-skyblue);
    }
    
    .question-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    
    .question-item {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    
    .question-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 100%;
      background: var(--penguin-skyblue);
    }
    
    .question-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      border-color: var(--penguin-skyblue);
    }
    
    .question-item.hard {
      border-color: #ffcdd2;
    }
    
    .question-item.hard::before {
      background: #f44336;
    }
    
    .question-item.medium {
      border-color: #ffe0b2;
    }
    
    .question-item.medium::before {
      background: #ff9800;
    }
    
    .question-item.easy {
      border-color: #c8e6c9;
    }
    
    .question-item.easy::before {
      background: #4caf50;
    }
    
    .question-title {
      font-weight: bold;
      color: var(--penguin-navy);
      margin-bottom: 15px;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    
    .stat-label {
      color: #666;
    }
    
    .stat-value {
      font-weight: 600;
      color: var(--penguin-navy);
    }
    
    .answer-distribution {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
    }
    
    .answer-bar {
      margin-bottom: 10px;
    }
    
    .answer-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 13px;
    }
    
    .bar-container {
      background: #e0e0e0;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .bar-fill {
      height: 100%;
      background: var(--penguin-skyblue);
      transition: width 0.5s ease;
    }
    
    .bar-fill.correct {
      background: #4caf50;
    }
    
    .difficulty-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      color: white;
    }
    
    .badge-easy {
      background: #4caf50;
    }
    
    .badge-medium {
      background: #ff9800;
    }
    
    .badge-hard {
      background: #f44336;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 15px;
    }
    
    .btn-primary {
      background: var(--penguin-navy);
      color: white;
      box-shadow: 0 4px 12px rgba(29, 47, 78, 0.2);
    }
    
    .btn-primary:hover {
      background: var(--penguin-skyblue);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(95, 178, 201, 0.3);
    }
    
    @media (max-width: 768px) {
      .filter-grid {
        grid-template-columns: 1fr;
      }
      
      .question-stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="logo-container">
        <div class="logo">
          <a href="../index.html">
            <img src="../images/firstpenguin-logo2.png" alt="퍼스트펭귄 로고" />
          </a>
        </div>
        <div class="site-title">
          <a href="../index.html" style="text-decoration: none; color: inherit;">
            <div class="title-brand">퍼스트펭귄</div>
          </a>
          <h1>관리자 - 문제별 통계</h1>
        </div>
      </div>
    </div>
  </header>

  <main class="admin-container">
    <div class="page-header">
      <h1>📊 문제별 통계 분석</h1>
      <p>모든 사용자의 문제별 정답률 및 답안 선택 분포를 확인할 수 있습니다.</p>
    </div>

    <!-- 필터 섹션 -->
    <div class="filter-section">
      <div class="filter-grid">
        <div class="filter-group">
          <label>연도</label>
          <select id="yearFilter">
            <option value="">전체</option>
            <option value="2025" selected>2025년</option>
            <option value="2024">2024년</option>
            <option value="2023">2023년</option>
            <option value="2022">2022년</option>
            <option value="2021">2021년</option>
            <option value="2020">2020년</option>
            <option value="2019">2019년</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>과목</label>
          <select id="subjectFilter">
            <option value="">전체</option>
            <option value="운동생리학">운동생리학</option>
            <option value="건강체력평가">건강체력평가</option>
            <option value="운동처방론">운동처방론</option>
            <option value="운동부하검사">운동부하검사</option>
            <option value="운동상해">운동상해</option>
            <option value="기능해부학">기능해부학</option>
            <option value="병태생리학">병태생리학</option>
            <option value="스포츠심리학">스포츠심리학</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>난이도</label>
          <select id="difficultyFilter">
            <option value="">전체</option>
            <option value="hard">어려움 (정답률 50% 미만)</option>
            <option value="medium">보통 (정답률 50-79.9%)</option>
            <option value="easy">쉬움 (정답률 80% 이상)</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>문제 유형</label>
          <select id="typeFilter">
            <option value="">전체</option>
            <option value="regular">일반 문제</option>
            <option value="mockexam">모의고사</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>정렬</label>
          <select id="sortFilter">
            <option value="number">문제 번호 순</option>
            <option value="difficulty">난이도 순 (어려운 순)</option>
          </select>
        </div>
      </div>
      
      <button class="btn btn-primary" onclick="loadStatistics()">통계 조회</button>
    </div>

    <!-- 요약 통계 -->
    <div id="summaryStats" class="stats-card">
      <h2>요약 통계</h2>
      <div id="summaryContent">통계를 조회해주세요.</div>
    </div>

    <!-- 문제별 상세 통계 -->
    <div id="questionStats" class="stats-card">
      <h2>문제별 상세 통계</h2>
      <div id="questionStatsContent">통계를 조회해주세요.</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <a href="../index.html" style="color: white;">
            <img src="../images/firstpenguin-logo.png" alt="퍼스트펭귄 로고" />
            <span>퍼스트펭귄</span>
          </a>
        </div>
        <div class="copyright">
          &copy; 2025 퍼스트펭귄. All rights reserved.
        </div>
      </div>
    </div>
  </footer>

  <script type="module">
    import { auth, db } from '../js/core/firebase-core.js';
    import { isAdmin } from '../js/auth/auth-utils.js';
    import { 
      collection, 
      query, 
      where, 
      getDocs 
    } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
    
    window.addEventListener('DOMContentLoaded', () => {
      // 관리자 권한 확인
      auth.onAuthStateChanged(async (user) => {
        if (!user || !isAdmin(user)) {
          alert('관리자만 접근할 수 있습니다.');
          window.location.href = '../index.html';
          return;
        }
      });
    });
    
    // 통계 조회
    window.loadStatistics = async function() {
      try {
        const yearFilter = document.getElementById('yearFilter').value;
        const subjectFilter = document.getElementById('subjectFilter').value;
        const difficultyFilter = document.getElementById('difficultyFilter').value;
        const typeFilter = document.getElementById('typeFilter').value;
        
        // 전체 조회 경고
        if (!yearFilter && !subjectFilter) {
          if (!confirm('⚠️ 전체 데이터를 조회하면 많은 Firebase 읽기 비용이 발생합니다.\n\n연도 또는 과목을 선택하는 것을 권장합니다.\n\n그래도 조회하시겠습니까?')) {
            return;
          }
        }
        
        // 모든 attempts 가져오기 (최적화 필요)
        let q = collection(db, 'attempts');
        const snapshot = await getDocs(q);
        
        console.log(`📊 Firebase reads: ${snapshot.size}개 문서 읽음`);
        
        let attempts = [];
        snapshot.forEach(doc => {
          attempts.push({ id: doc.id, ...doc.data() });
        });
        
        // 필터 적용
        if (yearFilter) {
          attempts = attempts.filter(a => a.questionData?.year === yearFilter);
        }
        if (subjectFilter) {
          attempts = attempts.filter(a => a.questionData?.subject === subjectFilter);
        }
        
        // ✅ 문제 유형 필터링
        if (typeFilter === 'regular') {
          attempts = attempts.filter(a => !a.questionData?.isFromMockExam);
          console.log('✅ 일반 문제만 필터링');
        } else if (typeFilter === 'mockexam') {
          attempts = attempts.filter(a => a.questionData?.isFromMockExam);
          console.log('✅ 모의고사만 필터링');
        }
        
        // 문제별 통계 계산
        const questionStats = calculateQuestionStats(attempts);
        
        // 난이도 필터
        if (difficultyFilter) {
          const filtered = {};
          Object.keys(questionStats).forEach(key => {
            const stat = questionStats[key];
            const accuracy = (stat.correct / stat.total * 100);
            
            if (difficultyFilter === 'hard' && accuracy < 50) {
              filtered[key] = stat;
            } else if (difficultyFilter === 'medium' && accuracy >= 50 && accuracy < 80) {
              filtered[key] = stat;
            } else if (difficultyFilter === 'easy' && accuracy >= 80) {
              filtered[key] = stat;
            }
          });
          renderQuestionStats(filtered);
        } else {
          renderQuestionStats(questionStats);
        }
        
        // 요약 통계
        renderSummary(attempts, questionStats);
        
      } catch (error) {
        console.error('통계 조회 오류:', error);
        alert('통계를 불러오는 중 오류가 발생했습니다.');
      }
    };
    
    // 문제별 통계 계산
    function calculateQuestionStats(attempts) {
      const stats = {};
      
      attempts.forEach(attempt => {
        const qData = attempt.questionData;
        if (!qData) return;
        
        // ✅ 문제 유형 구분을 위한 키 생성
        const type = qData.isFromMockExam ? 'mock' : 'regular';
        const key = `${qData.year}_${qData.subject}_${qData.number}_${type}`;
        
        if (!stats[key]) {
          stats[key] = {
            year: qData.year,
            subject: qData.subject,
            number: qData.number,
            isFromMockExam: qData.isFromMockExam || false,
            total: 0,
            correct: 0,
            answers: { 0: 0, 1: 0, 2: 0, 3: 0 }
          };
        }
        
        stats[key].total++;
        if (attempt.isCorrect) {
          stats[key].correct++;
        }
        
        // 답안 선택 집계
        const userAnswer = attempt.userAnswer;
        if (userAnswer !== undefined && userAnswer !== null) {
          stats[key].answers[userAnswer]++;
        }
      });
      
      return stats;
    }
    
    // 통계 렌더링
    function renderQuestionStats(questionStats) {
      const container = document.getElementById('questionStatsContent');
      
      if (Object.keys(questionStats).length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #666;">해당 조건의 데이터가 없습니다.</p>';
        return;
      }
      
      // 정렬 옵션
      const sortFilter = document.getElementById('sortFilter').value;
      
      let sortedStats = Object.entries(questionStats);
      
      if (sortFilter === 'difficulty') {
        // 난이도 순 (어려운 문제 먼저)
        sortedStats.sort((a, b) => {
          const accA = a[1].correct / a[1].total;
          const accB = b[1].correct / b[1].total;
          return accA - accB;
        });
      } else {
        // 문제 번호 순
        sortedStats.sort((a, b) => {
          // 연도 비교 (최신순)
          if (a[1].year !== b[1].year) {
            return b[1].year.localeCompare(a[1].year);
          }
          // 과목 비교
          if (a[1].subject !== b[1].subject) {
            return a[1].subject.localeCompare(b[1].subject);
          }
          // 문제 번호 비교
          return a[1].number - b[1].number;
        });
      }
      
      let html = '<div class="question-stats-grid">';
      
      sortedStats.forEach(([key, stat]) => {
        const accuracy = (stat.correct / stat.total * 100).toFixed(1);
        let difficulty = 'medium';
        let difficultyText = '보통';
        
        if (accuracy < 50) {
          difficulty = 'hard';
          difficultyText = '어려움';
        } else if (accuracy >= 80) {
          difficulty = 'easy';
          difficultyText = '쉬움';
        }
        
        // 문제 유형 배지
        const typeBadge = stat.isFromMockExam ? 
          '<span style="background: #9c27b0; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; margin-left: 5px;">모의고사</span>' :
          '<span style="background: #2196f3; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; margin-left: 5px;">일반</span>';
        
        html += `
          <div class="question-item ${difficulty}">
            <div class="question-title">
              <span>${stat.year}년 ${stat.subject} ${stat.number}번 ${typeBadge}</span>
              <span class="difficulty-badge badge-${difficulty}">${difficultyText}</span>
            </div>
            
            <div class="stat-row">
              <span class="stat-label">응시 인원</span>
              <span class="stat-value">${stat.total}명</span>
            </div>
            
            <div class="stat-row">
              <span class="stat-label">정답률</span>
              <span class="stat-value" style="color: ${difficulty === 'hard' ? '#f44336' : difficulty === 'easy' ? '#4caf50' : '#ff9800'}">
                ${accuracy}%
              </span>
            </div>
            
            <div class="answer-distribution">
              <div style="font-weight: 600; margin-bottom: 10px; font-size: 13px;">답안 선택률</div>
              ${[0, 1, 2, 3].map(i => {
                const count = stat.answers[i] || 0;
                const percentage = stat.total > 0 ? (count / stat.total * 100).toFixed(1) : 0;
                return `
                  <div class="answer-bar">
                    <div class="answer-label">
                      <span>${i + 1}번</span>
                      <span>${count}명 (${percentage}%)</span>
                    </div>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: ${percentage}%"></div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      });
      
      html += '</div>';
      container.innerHTML = html;
    }
    
    // 요약 통계
    function renderSummary(attempts, questionStats) {
      const container = document.getElementById('summaryContent');
      
      const totalQuestions = Object.keys(questionStats).length;
      const totalAttempts = attempts.length;
      const totalUsers = new Set(attempts.map(a => a.userId)).size;
      
      const avgAccuracy = Object.values(questionStats).reduce((sum, stat) => {
        return sum + (stat.correct / stat.total * 100);
      }, 0) / totalQuestions || 0;
      
      const hardQuestions = Object.values(questionStats).filter(s => (s.correct / s.total * 100) < 50).length;
      
      container.innerHTML = `
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${totalQuestions}</div>
            <div style="color: #666; margin-top: 8px;">분석된 문제 수</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${totalUsers}</div>
            <div style="color: #666; margin-top: 8px;">참여 사용자 수</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${totalAttempts}</div>
            <div style="color: #666; margin-top: 8px;">총 풀이 횟수</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${avgAccuracy.toFixed(1)}%</div>
            <div style="color: #666; margin-top: 8px;">평균 정답률</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #ffebee; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: #f44336;">${hardQuestions}</div>
            <div style="color: #666; margin-top: 8px;">고난도 문제 (50% 미만)</div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
