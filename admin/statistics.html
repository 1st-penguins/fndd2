<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문제별 통계 | 관리자 | 퍼스트펭귄</title>
  
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  
  <script src="../js/logger.js"></script>
  
  <!-- Firebase -->
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
  
  <script type="module" src="../js/core/firebase-core.js"></script>
  <script type="module" src="../js/auth/auth-core.js"></script>
  <script type="module" src="../js/auth/auth-utils.js"></script>
  
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <!-- SheetJS (xlsx 다운로드용) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <style>
    /* 헤더 로고 크기 */
    header .logo img {
      max-width: 50px;
      max-height: 50px;
      object-fit: contain;
    }
    
    .admin-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 20px;
    }
    
    .page-header {
      margin-bottom: 30px;
    }
    
    .page-header h1 {
      color: var(--penguin-navy);
      margin-bottom: 10px;
    }
    
    .filter-section {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .filter-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--penguin-navy);
    }
    
    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
    }
    
    .stats-card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .stats-card h2 {
      color: var(--penguin-navy);
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--penguin-skyblue);
    }
    
    .question-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    
    .question-item {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    
    .question-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 100%;
      background: var(--penguin-skyblue);
    }
    
    .question-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      border-color: var(--penguin-skyblue);
    }
    
    .question-item.hard {
      border-color: #ffcdd2;
    }
    
    .question-item.hard::before {
      background: #f44336;
    }
    
    .question-item.medium {
      border-color: #ffe0b2;
    }
    
    .question-item.medium::before {
      background: #ff9800;
    }
    
    .question-item.easy {
      border-color: #c8e6c9;
    }
    
    .question-item.easy::before {
      background: #4caf50;
    }
    
    .question-title {
      font-weight: bold;
      color: var(--penguin-navy);
      margin-bottom: 15px;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    
    .stat-label {
      color: #666;
    }
    
    .stat-value {
      font-weight: 600;
      color: var(--penguin-navy);
    }
    
    .answer-distribution {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
    }
    
    .answer-bar {
      margin-bottom: 10px;
    }
    
    .answer-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 13px;
    }
    
    .bar-container {
      background: #e0e0e0;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .bar-fill {
      height: 100%;
      background: var(--penguin-skyblue);
      transition: width 0.5s ease;
    }
    
    .bar-fill.correct {
      background: #4caf50;
    }
    
    .difficulty-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      color: white;
    }
    
    .badge-easy {
      background: #4caf50;
    }
    
    .badge-medium {
      background: #ff9800;
    }
    
    .badge-hard {
      background: #f44336;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 15px;
    }
    
    .btn-primary {
      background: var(--penguin-navy);
      color: white;
      box-shadow: 0 4px 12px rgba(29, 47, 78, 0.2);
    }
    
    .btn-primary:hover {
      background: var(--penguin-skyblue);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(95, 178, 201, 0.3);
    }
    
    @media (max-width: 768px) {
      .filter-grid {
        grid-template-columns: 1fr;
      }
      
      .question-stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="logo-container">
        <div class="logo">
          <a href="../index.html">
            <img src="../images/firstpenguin-logo2.png" alt="퍼스트펭귄 로고" />
          </a>
        </div>
        <div class="site-title">
          <a href="../index.html" style="text-decoration: none; color: inherit;">
            <div class="title-brand">퍼스트펭귄</div>
          </a>
          <h1>관리자 - 문제별 통계</h1>
        </div>
      </div>
    </div>
  </header>

  <main class="admin-container">
    <div class="page-header">
      <h1>📊 문제별 통계 분석</h1>
      <p>모든 사용자의 문제별 정답률 및 답안 선택 분포를 확인할 수 있습니다.</p>
    </div>

    <!-- 필터 섹션 -->
    <div class="filter-section">
      <div class="filter-grid">
        <div class="filter-group">
          <label>연도</label>
          <select id="yearFilter">
            <option value="">전체</option>
            <option value="2025" selected>2025년</option>
            <option value="2024">2024년</option>
            <option value="2023">2023년</option>
            <option value="2022">2022년</option>
            <option value="2021">2021년</option>
            <option value="2020">2020년</option>
            <option value="2019">2019년</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>과목</label>
          <select id="subjectFilter">
            <option value="">전체</option>
            <option value="운동생리학">운동생리학</option>
            <option value="건강체력평가">건강체력평가</option>
            <option value="운동처방론">운동처방론</option>
            <option value="운동부하검사">운동부하검사</option>
            <option value="운동상해">운동상해</option>
            <option value="기능해부학">기능해부학</option>
            <option value="병태생리학">병태생리학</option>
            <option value="스포츠심리학">스포츠심리학</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>난이도</label>
          <select id="difficultyFilter">
            <option value="">전체</option>
            <option value="hard">어려움 (정답률 50% 미만)</option>
            <option value="medium">보통 (정답률 50-79.9%)</option>
            <option value="easy">쉬움 (정답률 80% 이상)</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>문제 유형</label>
          <select id="typeFilter">
            <option value="regular" selected>일반 문제</option>
            <option value="mockexam">모의고사</option>
            <option value="">전체 (통합)</option>
          </select>
        </div>
        
        <div class="filter-group">
          <label>정렬</label>
          <select id="sortFilter">
            <option value="number">문제 번호 순</option>
            <option value="difficulty">난이도 순 (어려운 순)</option>
          </select>
        </div>

        <div class="filter-group" style="display:flex; flex-direction:column; justify-content:flex-end;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;">
            <input type="checkbox" id="completedOnlyToggle" checked
                   style="width:16px; height:16px; cursor:pointer;">
            <span>완주 세션만 집계</span>
          </label>
          <span style="font-size:11px; color:#888; margin-top:4px;">일반 20문제·모의고사 80문제 기준</span>
        </div>
      </div>

      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <button id="loadStatsBtn" class="btn btn-primary" onclick="loadStatistics()">통계 조회</button>
        <button id="downloadXlsxBtn" class="btn" onclick="downloadXlsx()"
                style="background:#217346; color:#fff; display:none;">
          📥 엑셀 다운로드 (.xlsx)
        </button>
      </div>
    </div>

    <!-- 요약 통계 -->
    <div id="summaryStats" class="stats-card">
      <h2>요약 통계</h2>
      <div id="summaryContent">통계를 조회해주세요.</div>
    </div>

    <!-- 문제별 상세 통계 -->
    <div id="questionStats" class="stats-card">
      <h2>문제별 상세 통계</h2>
      <div id="questionStatsContent">통계를 조회해주세요.</div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <a href="../index.html" style="color: white;">
            <img src="../images/firstpenguin-logo.png" alt="퍼스트펭귄 로고" />
            <span>퍼스트펭귄</span>
          </a>
        </div>
        <div class="copyright">
          &copy; 2025 퍼스트펭귄. All rights reserved.
        </div>
      </div>
    </div>
  </footer>

  <script type="module">
    import { ensureFirebase, ensureAuthReady } from '../js/core/firebase-core.js';
    import { isAdmin } from '../js/auth/auth-utils.js';
    import {
      collection,
      query,
      where,
      getDocs
    } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    // Firebase 초기화 대기 후 auth, db 참조
    const { auth, db } = await ensureFirebase();

    // 관리자 권한 확인
    const user = await ensureAuthReady();
    if (!user || !isAdmin(user)) {
      alert('관리자만 접근할 수 있습니다.');
      window.location.href = '../index.html';
    }
    
    // ─── V4-A1: 완주 세션 필터 ────────────────────────────────────────────
    // 일반문제: 세션당 attempts 수 >= 20, 모의고사: >= 80
    // sessionId 없는 레거시 attempts는 필터 통과 (유지)
    function filterCompletedAttempts(allAttempts) {
      const groups = {};
      allAttempts.forEach(a => {
        if (!a.sessionId) return; // sessionId 없는 건 별도 처리
        (groups[a.sessionId] = groups[a.sessionId] || []).push(a);
      });
      const completedIds = new Set();
      Object.entries(groups).forEach(([sid, list]) => {
        const isMock = list.some(a => a.questionData?.isFromMockExam === true);
        if (list.length >= (isMock ? 80 : 20)) completedIds.add(sid);
      });
      return allAttempts.filter(a => !a.sessionId || completedIds.has(a.sessionId));
    }

    // ─── V4-C3: 오답 1위 선택지 ─────────────────────────────────────────
    // correctAnswer: 0-based 인덱스 (V3 필드). undefined면 전체 중 최다 선택.
    function getTopWrongAnswer(answers, correctAnswer, total) {
      let topIdx = -1;
      let topCount = 0;
      for (let i = 0; i < 4; i++) {
        if (correctAnswer !== undefined && correctAnswer !== null && i === correctAnswer) continue;
        const cnt = answers[i] || 0;
        if (cnt > topCount) { topCount = cnt; topIdx = i; }
      }
      const pct = total > 0 && topCount > 0 ? Math.round(topCount / total * 100) : 0;
      return { idx: topIdx, count: topCount, pct };
    }

    // ─── V4-C5: xlsx 다운로드 ────────────────────────────────────────────
    let _lastTableRows = []; // 마지막 테이블 데이터 저장
    window.downloadXlsx = function() {
      if (!_lastTableRows.length) { alert('먼저 통계를 조회하세요.'); return; }
      const header = ['문제번호', '과목', '연도', '정답률(%)', '오답 1위 선택지', '오답 1위 비율(%)', '총 응시수'];
      const rows = _lastTableRows.map(r => [
        r.number, r.subject, r.year,
        r.accuracy,
        r.topWrong >= 0 ? (r.topWrong + 1) + '번' : '-',
        r.topWrongPct,
        r.total
      ]);
      const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
      // 열 너비 설정
      ws['!cols'] = [8, 16, 8, 10, 14, 14, 10].map(w => ({ wch: w }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '문제별통계');
      const yearVal = document.getElementById('yearFilter').value || '전체';
      const subVal  = document.getElementById('subjectFilter').value || '전과목';
      XLSX.writeFile(wb, `${yearVal}_${subVal}_문제별통계.xlsx`);
    };

    // 통계 조회
    window.loadStatistics = async function() {
      const btn = document.getElementById('loadStatsBtn');
      const originalText = btn.textContent;
      try {
        const yearFilter = document.getElementById('yearFilter').value;
        const subjectFilter = document.getElementById('subjectFilter').value;
        const difficultyFilter = document.getElementById('difficultyFilter').value;
        const typeFilter = document.getElementById('typeFilter').value;

        // 연도 또는 과목 필수 선택 강제
        if (!yearFilter && !subjectFilter) {
          alert('Firebase 비용 절감을 위해 연도 또는 과목을 반드시 선택해주세요.');
          return;
        }

        // 로딩 상태 표시
        btn.disabled = true;
        btn.textContent = '조회 중...';
        btn.style.opacity = '0.7';

        // Firestore 서버 측 필터링 (읽기 비용 대폭 절감)
        let q = collection(db, 'attempts');
        const constraints = [];
        if (yearFilter) {
          constraints.push(where('questionData.year', '==', yearFilter));
        }
        if (subjectFilter) {
          constraints.push(where('questionData.subject', '==', subjectFilter));
        }
        const finalQuery = constraints.length > 0 ? query(q, ...constraints) : q;
        const snapshot = await getDocs(finalQuery);

        console.log(`📊 Firebase reads: ${snapshot.size}개 문서 읽음`);

        let attempts = [];
        snapshot.forEach(doc => {
          attempts.push({ id: doc.id, ...doc.data() });
        });

        // V4-A1: 완주 세션 필터 (토글 ON 시)
        if (document.getElementById('completedOnlyToggle').checked) {
          const before = attempts.length;
          attempts = filterCompletedAttempts(attempts);
          console.log(`✅ 완주 세션 필터: ${before}개 → ${attempts.length}개`);
        }
        
        // ✅ 문제 유형 필터링
        if (typeFilter === 'regular') {
          attempts = attempts.filter(a => !a.questionData?.isFromMockExam);
          console.log('✅ 일반 문제만 필터링');
        } else if (typeFilter === 'mockexam') {
          attempts = attempts.filter(a => a.questionData?.isFromMockExam);
          console.log('✅ 모의고사만 필터링');
        }
        
        // 문제별 통계 계산
        const questionStats = calculateQuestionStats(attempts);
        
        // 난이도 필터
        if (difficultyFilter) {
          const filtered = {};
          Object.keys(questionStats).forEach(key => {
            const stat = questionStats[key];
            const accuracy = (stat.correct / stat.total * 100);
            
            if (difficultyFilter === 'hard' && accuracy < 50) {
              filtered[key] = stat;
            } else if (difficultyFilter === 'medium' && accuracy >= 50 && accuracy < 80) {
              filtered[key] = stat;
            } else if (difficultyFilter === 'easy' && accuracy >= 80) {
              filtered[key] = stat;
            }
          });
          renderQuestionStats(filtered);
        } else {
          renderQuestionStats(questionStats);
        }
        
        // 요약 통계
        renderSummary(attempts, questionStats);
        
      } catch (error) {
        console.error('통계 조회 오류:', error);
        alert('통계를 불러오는 중 오류가 발생했습니다.\n\n' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
        btn.style.opacity = '';
      }
    };
    
    // 문제별 통계 계산
    function calculateQuestionStats(attempts) {
      const stats = {};
      
      attempts.forEach(attempt => {
        const qData = attempt.questionData;
        if (!qData) return;
        
        // ✅ 문제 유형 구분을 위한 키 생성
        const type = qData.isFromMockExam ? 'mock' : 'regular';
        const key = `${qData.year}_${qData.subject}_${qData.number}_${type}`;
        
        if (!stats[key]) {
          stats[key] = {
            year: qData.year,
            subject: qData.subject,
            number: qData.number,
            isFromMockExam: qData.isFromMockExam || false,
            total: 0,
            correct: 0,
            answers: { 0: 0, 1: 0, 2: 0, 3: 0 },
            correctAnswer: undefined  // V4-C3: 아래서 채워짐
          };
        }
        // correctAnswer 필드 (V3에서 추가된 필드, 0-based)
        if (stats[key].correctAnswer === undefined && attempt.correctAnswer !== undefined) {
          stats[key].correctAnswer = attempt.correctAnswer;
        }
        
        stats[key].total++;
        if (attempt.isCorrect) {
          stats[key].correct++;
        }
        
        // 답안 선택 집계
        const userAnswer = attempt.userAnswer;
        if (userAnswer !== undefined && userAnswer !== null) {
          stats[key].answers[userAnswer]++;
        }
      });
      
      return stats;
    }
    
    // 통계 렌더링
    function renderQuestionStats(questionStats) {
      const container = document.getElementById('questionStatsContent');

      if (Object.keys(questionStats).length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #666;">해당 조건의 데이터가 없습니다.</p>';
        document.getElementById('downloadXlsxBtn').style.display = 'none';
        return;
      }

      // 정렬 옵션
      const sortFilter = document.getElementById('sortFilter').value;

      let sortedStats = Object.entries(questionStats);

      if (sortFilter === 'difficulty') {
        // 난이도 순 (어려운 문제 먼저)
        sortedStats.sort((a, b) => {
          const accA = a[1].correct / a[1].total;
          const accB = b[1].correct / b[1].total;
          return accA - accB;
        });
      } else {
        // 문제 번호 순 (연도 최신 → 과목 가나다 → 번호 오름차순)
        sortedStats.sort((a, b) => {
          if (a[1].year !== b[1].year) return b[1].year.localeCompare(a[1].year);
          if (a[1].subject !== b[1].subject) return a[1].subject.localeCompare(b[1].subject);
          return Number(a[1].number) - Number(b[1].number);
        });
      }

      // ── V4-C4: 컴팩트 테이블 (상단) ──────────────────────────────────
      _lastTableRows = sortedStats.map(([, stat]) => {
        const accuracy = stat.total > 0 ? Math.round(stat.correct / stat.total * 100) : 0;
        const tw = getTopWrongAnswer(stat.answers, stat.correctAnswer, stat.total);
        return { number: stat.number, subject: stat.subject, year: stat.year,
                 accuracy, topWrong: tw.idx, topWrongPct: tw.pct, total: stat.total };
      });

      const isAllTypes = document.getElementById('typeFilter').value === '';

      function buildTableHTML(stats, title) {
        const rows = stats.map(([, stat]) => {
          const accuracy = stat.total > 0 ? Math.round(stat.correct / stat.total * 100) : 0;
          const accColor = accuracy < 50 ? '#f44336' : accuracy >= 80 ? '#4caf50' : '#ff9800';
          const tw = getTopWrongAnswer(stat.answers, stat.correctAnswer, stat.total);
          const twLabel = tw.idx >= 0 ? `${tw.idx + 1}번 (${tw.pct}%)` : '-';
          return `<tr style="border-bottom:1px solid #eee;">
            <td style="text-align:center;">${stat.number}</td>
            <td>${stat.subject}</td>
            <td style="text-align:center;">${stat.year}</td>
            <td style="text-align:center; font-weight:700; color:${accColor};">${accuracy}%</td>
            <td style="text-align:center;">${twLabel}</td>
            <td style="text-align:center;">${stat.total}명</td>
          </tr>`;
        }).join('');
        const titleHtml = title ? `<h3 style="margin:24px 0 12px; color:#1d2f4e; font-size:16px;">${title}</h3>` : '';
        return `${titleHtml}
          <div style="overflow-x:auto; margin-bottom:16px;">
            <table style="width:100%; border-collapse:collapse; font-size:14px;">
              <thead>
                <tr style="background:#1d2f4e; color:#fff;">
                  <th style="padding:10px 8px; text-align:center; white-space:nowrap;">문제번호</th>
                  <th style="padding:10px 8px; text-align:left; white-space:nowrap;">과목</th>
                  <th style="padding:10px 8px; text-align:center; white-space:nowrap;">연도</th>
                  <th style="padding:10px 8px; text-align:center; white-space:nowrap;">정답률</th>
                  <th style="padding:10px 8px; text-align:center; white-space:nowrap;">오답 1위</th>
                  <th style="padding:10px 8px; text-align:center; white-space:nowrap;">응시 수</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      let tableHtml;
      if (isAllTypes) {
        const regularStats = sortedStats.filter(([, s]) => !s.isFromMockExam);
        const mockStats = sortedStats.filter(([, s]) => s.isFromMockExam);
        tableHtml = '';
        if (regularStats.length > 0) {
          tableHtml += buildTableHTML(regularStats, `📝 일반 문제 (${regularStats.length}개)`);
        }
        if (mockStats.length > 0) {
          tableHtml += buildTableHTML(mockStats, `📋 모의고사 (${mockStats.length}개)`);
        }
      } else {
        tableHtml = buildTableHTML(sortedStats, null);
      }

      tableHtml += `
        <details style="margin-bottom:16px;">
          <summary style="cursor:pointer; font-weight:600; color:#1d2f4e; padding:8px 0;">
            ▶ 상세 분포 보기 (클릭하여 펼치기)
          </summary>
          <div id="detailCardsContainer"></div>
        </details>`;

      container.innerHTML = tableHtml;
      document.getElementById('downloadXlsxBtn').style.display = 'inline-flex';

      // 상세 카드: details 펼칠 때 lazy 렌더링
      const detailsEl = container.querySelector('details');
      const detailContainer = container.querySelector('#detailCardsContainer');
      let cardsRendered = false;
      detailsEl.addEventListener('toggle', () => {
        if (detailsEl.open && !cardsRendered) {
          cardsRendered = true;
          let html = '<div class="question-stats-grid">';
          sortedStats.forEach(([, stat]) => {
            const accuracy = (stat.correct / stat.total * 100).toFixed(1);
            let difficulty = accuracy < 50 ? 'hard' : accuracy >= 80 ? 'easy' : 'medium';
            let difficultyText = difficulty === 'hard' ? '어려움' : difficulty === 'easy' ? '쉬움' : '보통';
            const typeBadge = stat.isFromMockExam
              ? '<span style="background:#9c27b0;color:#fff;padding:3px 8px;border-radius:12px;font-size:11px;margin-left:5px;">모의고사</span>'
              : '<span style="background:#2196f3;color:#fff;padding:3px 8px;border-radius:12px;font-size:11px;margin-left:5px;">일반</span>';
            html += `
              <div class="question-item ${difficulty}">
                <div class="question-title">
                  <span>${stat.year}년 ${stat.subject} ${stat.number}번 ${typeBadge}</span>
                  <span class="difficulty-badge badge-${difficulty}">${difficultyText}</span>
                </div>
                <div class="stat-row">
                  <span class="stat-label">응시 인원</span>
                  <span class="stat-value">${stat.total}명</span>
                </div>
                <div class="stat-row">
                  <span class="stat-label">정답률</span>
                  <span class="stat-value" style="color:${difficulty === 'hard' ? '#f44336' : difficulty === 'easy' ? '#4caf50' : '#ff9800'}">${accuracy}%</span>
                </div>
                <div class="answer-distribution">
                  <div style="font-weight:600;margin-bottom:10px;font-size:13px;">답안 선택률</div>
                  ${[0, 1, 2, 3].map(i => {
                    const count = stat.answers[i] || 0;
                    const pct = stat.total > 0 ? (count / stat.total * 100).toFixed(1) : 0;
                    return `<div class="answer-bar">
                      <div class="answer-label"><span>${i + 1}번</span><span>${count}명 (${pct}%)</span></div>
                      <div class="bar-container"><div class="bar-fill" style="width:${pct}%"></div></div>
                    </div>`;
                  }).join('')}
                </div>
              </div>`;
          });
          html += '</div>';
          detailContainer.innerHTML = html;
        }
      });
    }
    
    // 요약 통계
    function renderSummary(attempts, questionStats) {
      const container = document.getElementById('summaryContent');
      
      const totalQuestions = Object.keys(questionStats).length;
      const totalAttempts = attempts.length;
      const totalUsers = new Set(attempts.map(a => a.userId)).size;
      
      const avgAccuracy = Object.values(questionStats).reduce((sum, stat) => {
        return sum + (stat.correct / stat.total * 100);
      }, 0) / totalQuestions || 0;
      
      const hardQuestions = Object.values(questionStats).filter(s => (s.correct / s.total * 100) < 50).length;
      
      container.innerHTML = `
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${totalQuestions}</div>
            <div style="color: #666; margin-top: 8px;">분석된 문제 수</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${totalUsers}</div>
            <div style="color: #666; margin-top: 8px;">참여 사용자 수</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${totalAttempts}</div>
            <div style="color: #666; margin-top: 8px;">총 풀이 횟수</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: var(--penguin-skyblue);">${avgAccuracy.toFixed(1)}%</div>
            <div style="color: #666; margin-top: 8px;">평균 정답률</div>
          </div>
          <div style="text-align: center; padding: 20px; background: #ffebee; border-radius: 8px;">
            <div style="font-size: 32px; font-weight: bold; color: #f44336;">${hardQuestions}</div>
            <div style="color: #666; margin-top: 8px;">고난도 문제 (50% 미만)</div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
