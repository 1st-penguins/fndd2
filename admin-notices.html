<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 관리</title>
  <link rel="canonical" href="https://the1stpeng.com/admin-notices.html" />
  
  <!-- 기본 스타일 -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin/admin.css">
  
  <!-- Firebase 및 로그인 관리 스크립트 (모듈 방식) -->
  <script type="module" src="js/core/firebase-core.js"></script>
  <script type="module" src="js/auth/auth-core.js"></script>
  <script type="module" src="js/auth/auth-utils.js"></script>
  
  <!-- 공지사항 모듈 -->
  <script type="module" src="js/data/notice-repository.js"></script>
  
  <!-- 관리자 페이지 스크립트 -->
  <script type="module" src="js/admin/notices-admin.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
    h1, h2 { color: #1D2F4E; }
    .container { max-width: 1000px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], textarea, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    textarea { min-height: 200px; }
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
    .btn-primary { background-color: #5FB2C9; color: white; }
    .btn-success { background-color: #37b24d; color: white; }
    .btn-danger { background-color: #ff6b6b; color: white; }
    .btn-warning { background-color: #fcc419; color: white; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    table th, table td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
    table th { background-color: #f5f5f5; }
    .notice-status { padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
    .status-published { background-color: #d3f9d8; color: #2b8a3e; }
    .status-draft { background-color: #e9ecef; color: #495057; }
    .loading { text-align: center; padding: 20px; }
    .back-link { text-decoration: none; color: #1D2F4E; display: inline-block; margin-bottom: 20px; }
    .form-actions { margin-top: 20px; }
    .action-buttons { display: flex; gap: 5px; }
    .badge { display: inline-block; padding: 3px 6px; border-radius: 3px; font-size: 12px; }
    
    /* 동적 배지 클래스 대응 */
    .notice-badge-new { background-color: #f44336; color: white; }
    .notice-badge-important { background-color: #ff9800; color: white; }
    .notice-badge-lecture-upcoming { background-color: #4caf50; color: white; }
    .notice-badge-lecture-ended { background-color: #9e9e9e; color: white; }
    .notice-badge-event { background-color: #8b5cf6; color: white; }
    .notice-badge-notice { background-color: #2196f3; color: white; }
    .notice-badge-update { background-color: #4caf50; color: white; }
    .notice-badge-faq { background-color: #607d8b; color: white; }
    .notice-badge-guide { background-color: #009688; color: white; }
    .notice-badge-default { background-color: #5FB2C9; color: white; }

    /* 배지 색상 */
    .badge-신규 { background-color: #f44336; color: white; }
    .badge-중요 { background-color: #ff9800; color: white; }
    .badge-강의예정 { background-color: #4caf50; color: white; }
    .badge-강의종료 { background-color: #9e9e9e; color: white; }
    .badge-행사 { background-color: #8b5cf6; color: white; }
    .badge-안내 { background-color: #2196f3; color: white; }
    .badge-업데이트 { background-color: #4caf50; color: white; }
    .badge-FAQ { background-color: #607d8b; color: white; }
    .badge-가이드 { background-color: #009688; color: white; }
    
    .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .filter-select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    
    /* 편집기 도구모음 */
    .editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 8px;
      background-color: #f5f5f5;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    
    .editor-btn {
      padding: 6px 10px;
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .editor-btn:hover {
      background-color: #e9ecef;
    }
    
    .editor-btn.active {
      background-color: #e9ecef;
      border-color: #adb5bd;
    }
    
    /* 미리보기 영역 */
    .preview-box {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 15px;
      margin-top: 15px;
      background-color: white;
      min-height: 100px;
    }
    
    .notice-content img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← 홈으로 돌아가기</a>
    <h1>공지사항 관리</h1>
    
    <!-- 공지사항 작성 폼 -->
    <div>
      <h2 id="form-title">새 공지사항 작성</h2>
      <input type="hidden" id="notice-id">
      <div class="form-group">
        <label for="notice-title">제목</label>
        <input type="text" id="notice-title" placeholder="공지사항 제목">
      </div>
      <div class="form-group">
        <label for="notice-badge">배지</label>
        <select id="notice-badge">
          <option value="">없음</option>
          <option value="신규">신규</option>
          <option value="중요">중요</option>
          <option value="강의예정">강의예정</option>
          <option value="강의종료">강의종료</option>
          <option value="행사">행사</option>
          <option value="안내">안내</option>
          <option value="업데이트">업데이트</option>
          <option value="FAQ">FAQ</option>
          <option value="가이드">가이드</option>
        </select>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="notice-pinned"> 상단에 고정
        </label>
      </div>
      <div class="form-group">
        <label for="notice-content">내용</label>
        <div class="editor-toolbar">
          <button type="button" class="editor-btn" data-format="h1">제목 1</button>
          <button type="button" class="editor-btn" data-format="h2">제목 2</button>
          <button type="button" class="editor-btn" data-format="h3">제목 3</button>
          <button type="button" class="editor-btn" data-format="b">굵게</button>
          <button type="button" class="editor-btn" data-format="i">기울임</button>
          <button type="button" class="editor-btn" data-format="u">밑줄</button>
          <select class="editor-btn" id="font-color">
            <option value="">글자 색상</option>
            <option value="red">빨간색</option>
            <option value="blue">파란색</option>
            <option value="green">녹색</option>
            <option value="purple">보라색</option>
            <option value="orange">주황색</option>
          </select>
          <button type="button" class="editor-btn" data-format="ul">목록</button>
          <button type="button" class="editor-btn" data-format="ol">번호 목록</button>
          <button type="button" class="editor-btn" data-format="img">이미지 URL</button>
          <button type="button" class="editor-btn" data-format="a">링크</button>
          <button type="button" class="editor-btn" data-format="center">가운데 정렬</button>
          <button type="button" class="editor-btn" data-format="quote">인용구</button>
        </div>
        <textarea id="notice-content" placeholder="공지사항 내용"></textarea>
      </div>
      <div class="form-group">
        <label>미리보기</label>
        <div class="preview-box" id="content-preview"></div>
      </div>
      <div class="form-actions">
        <button id="reset-btn" class="btn">새로 작성</button>
        <button id="publish-btn" class="btn btn-success">발행하기</button>
        <button id="draft-btn" class="btn btn-primary">초안 저장</button>
      </div>
    </div>
    
    <!-- 공지사항 목록 -->
    <div style="margin-top: 40px;">
      <h2>공지사항 목록</h2>
      
      <div class="filter-bar">
        <select id="status-filter" class="filter-select">
          <option value="all">모든 상태</option>
          <option value="published">발행됨</option>
          <option value="draft">초안</option>
        </select>
        <select id="badge-filter" class="filter-select">
          <option value="all">모든 배지</option>
          <option value="">없음</option>
          <option value="신규">신규</option>
          <option value="중요">중요</option>
          <option value="강의예정">강의예정</option>
          <option value="강의종료">강의종료</option>
          <option value="행사">행사</option>
          <option value="안내">안내</option>
          <option value="업데이트">업데이트</option>
          <option value="FAQ">FAQ</option>
          <option value="가이드">가이드</option>
        </select>
        <button id="refresh-btn" class="btn btn-primary">새로고침</button>
      </div>
      
      <div id="notices-loading" class="loading">공지사항을 불러오는 중...</div>
      <table id="notices-table" style="display: none;">
        <thead>
          <tr>
            <th>상태</th>
            <th>제목</th>
            <th>배지</th>
            <th>고정 여부</th>
            <th>날짜</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="notices-list"></tbody>
      </table>
    </div>
  </div>
</body>
</html>
