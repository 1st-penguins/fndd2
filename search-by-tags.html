<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="태그로 기출문제 검색하기 - 건강운동관리사, 생활스포츠지도사 자격증 시험 대비" />
  <title>태그 검색 - 퍼스트펭귄</title>
  <link rel="canonical" href="https://the1stpeng.com/search-by-tags.html" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1D2F4E">

  <!-- 구글 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Firebase 리소스 힌트 -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="//www.gstatic.com">
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="//firestore.googleapis.com">

  <!-- 외부 CSS 파일 연결 -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/linear-header.css" />
  <link rel="stylesheet" href="css/linear-footer.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/tag-search.css" />
  <link rel="stylesheet" href="css/wrong-note.css" />

  <!-- Firebase 관련 스크립트 -->
  <script type="module" src="js/core/firebase-core.js"></script>
  <script type="module" src="js/auth/auth-utils.js"></script>
  <script type="module" src="js/auth/auth-ui.js"></script>
  <script type="module" src="js/auth/auth-core.js"></script>
  <!-- 태그 검색은 모든 사용자에게 개방 -->
</head>

<body>
  <header class="linear-header" id="linear-header">
    <div class="linear-header__container">
      <a href="index.html" class="linear-header__brand">
        <div class="linear-header__logo">
          <img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄 로고" width="36" height="36" />
        </div>
        <span class="linear-header__brand-text">퍼스트펭귄</span>
        <span class="cert-badge" id="header-cert-badge">건강운동관리사</span>
      </a>

      <nav class="linear-header__nav">
        <ul class="linear-header__nav-list">
          <li class="linear-header__nav-item">
            <a href="index.html" class="linear-header__nav-link">홈</a>
          </li>
          <li class="linear-header__nav-item">
            <a href="index.html#lecture-tab" class="linear-header__nav-link">강의</a>
          </li>
          <li class="linear-header__nav-item">
            <a href="notices.html" class="linear-header__nav-link">공지사항</a>
          </li>
        </ul>
      </nav>

      <div class="linear-header__auth">
        <a href="#" class="linear-header__nav-link" data-action="show-login" id="login-link">로그인</a>
        <div id="user-profile-container" style="display: none;">
          <a href="mypage.html" class="linear-header__user-profile" style="text-decoration:none;color:inherit;">
            <div class="linear-header__user-avatar" id="user-avatar">U</div>
            <span class="linear-header__user-name" id="user-name">사용자</span>
          </a>
          <a href="#" class="linear-header__nav-link" data-action="logout">로그아웃</a>
        </div>
      </div>

      <div class="linear-header__actions">
        <button class="linear-header__mobile-toggle" id="mobile-toggle" aria-label="메뉴" aria-controls="mobile-menu"
          aria-expanded="false">
          <span class="linear-header__mobile-toggle-line"></span>
          <span class="linear-header__mobile-toggle-line"></span>
          <span class="linear-header__mobile-toggle-line"></span>
        </button>
      </div>
    </div>

    <!-- 모바일 메뉴 -->
    <div class="linear-header__mobile-menu" id="mobile-menu">
      <a href="index.html" class="linear-header__nav-link">홈</a>
      <a href="notices.html" class="linear-header__nav-link">공지사항</a>
      <a href="index.html#quiz-tab" class="linear-header__nav-link">문제풀기</a>
      <a href="index.html#lecture-tab" class="linear-header__nav-link">강의</a>
      <div class="mobile-menu-auth">
        <a href="#" class="linear-header__nav-link" data-action="show-login" id="mobile-login-link">로그인</a>
        <div id="mobile-user-profile-container" style="display: none;">
          <a href="mypage.html" class="linear-header__nav-link">마이페이지</a>
          <a href="#" class="linear-header__nav-link" data-action="logout" id="mobile-logout-link">로그아웃</a>
        </div>
      </div>
    </div>
  </header>

  <div class="main-content">
    <div class="container">
      <div class="tag-search-page">
        <!-- 페이지 헤더 -->
        <div class="tag-search-header">
          <h1>🏷️ 태그로 문제 검색</h1>
          <p class="tag-search-description">
            문제에 태그를 추가하고, 태그로 빠르게 원하는 문제를 찾아보세요.
          </p>
        </div>

        <!-- 검색 영역 -->
        <div class="tag-search-section">
          <div class="search-input-wrapper">
            <input type="text" id="tag-search-input" class="tag-search-input"
              placeholder="태그 또는 키워드 검색 (예: 탈진, 심전도, 격변이론...)" autocomplete="off" />
            <button id="tag-search-button" class="tag-search-button">검색</button>
          </div>

          <!-- 자동완성 드롭다운 -->
          <div id="tag-autocomplete" class="tag-autocomplete"></div>

          <!-- 선택된 태그 표시 -->
          <div id="selected-tags" class="selected-tags"></div>

          <!-- 인기 태그 -->
          <div class="popular-tags-section">
            <h3>인기 태그</h3>
            <div id="popular-tags" class="popular-tags">
              <div class="loading-tags">태그를 불러오는 중...</div>
            </div>
          </div>
        </div>

        <!-- 필터 영역 -->
        <div class="filter-section">
          <div class="filter-group">
            <label for="year-filter">년도</label>
            <select id="year-filter" class="filter-select">
              <option value="all">전체</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="subject-filter">과목</label>
            <select id="subject-filter" class="filter-select">
              <option value="all">전체</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="certificate-filter">자격증</label>
            <select id="certificate-filter" class="filter-select">
              <option value="all">전체</option>
              <option value="health-manager">건강운동관리사</option>
              <option value="sports-instructor">생활스포츠지도사</option>
              <option value="sports-instructor-1">1급 스포츠지도사</option>
            </select>
          </div>
          <!-- 관리자 모드 토글 -->
          <div class="filter-group admin-only-toggle" style="margin-left: auto;">
            <label class="switch-label"
              style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-muted);">
              <span>검토자 모드</span>
              <input type="checkbox" id="admin-mode-toggle" style="cursor: pointer;">
            </label>
          </div>
        </div>

        <!-- 검색 결과 -->
        <div class="search-results-section">
          <div class="results-header">
            <h2 id="results-title">검색 결과</h2>
            <div id="results-count" class="results-count">0개 문제</div>
          </div>
          <div id="search-results" class="search-results">
            <div class="empty-state">
              <div class="empty-state-icon">🔍</div>
              <p>태그를 입력하거나 인기 태그를 클릭하여 검색해보세요.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 인라인 태그 편집 모달 -->
  <div id="inline-edit-modal" class="modal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center;">
    <div class="modal-content"
      style="background: #1e293b; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 600px; color: white; border: 1px solid rgba(255,255,255,0.1);">
      <h3 id="modal-q-id" style="margin-top: 0; color: #38bdf8;">문제 태그 편집</h3>
      <p id="modal-q-subject" style="font-size: 14px; color: #94a3b8; margin-bottom: 1.5rem;"></p>

      <div
        style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; max-height: 150px; overflow-y: auto; font-size: 13px; line-height: 1.6;"
        id="modal-q-explanation">
        <!-- 해설 텍스트 로드 -->
      </div>

      <div class="input-group" style="margin-bottom: 1.5rem;">
        <label style="display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px;">매핑할 전문 용어 (해설에서 복사해서
          붙여넣으세요)</label>
        <input type="text" id="inline-tag-input" class="admin-input"
          style="width: 100%; padding: 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white;"
          placeholder="예: AMPK">
      </div>

      <div class="input-group" style="margin-bottom: 2rem;">
        <label style="display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px;">해당 용어가 속할 중간 카테고리</label>
        <select id="inline-category-select" class="admin-input"
          style="width: 100%; padding: 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white;">
          <!-- 과목별 카테고리 로드 -->
        </select>
      </div>

      <div style="display: flex; gap: 12px;">
        <button id="save-inline-tag" class="admin-btn-primary"
          style="flex: 1; background: #38bdf8; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer;">태그
          사전에 추가</button>
        <button onclick="document.getElementById('inline-edit-modal').style.display='none'"
          style="flex: 1; background: rgba(255,255,255,0.1); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer;">취소</button>
      </div>
    </div>
  </div>

  <!-- 문제 상세 모달 -->
  <div class="wrong-modal-overlay" id="question-detail-modal">
    <div class="wrong-modal">
      <div class="wrong-modal__header">
        <span class="wrong-modal__title" id="qmodal-title">문제 확인</span>
        <button class="wrong-modal__close" id="qmodal-close-btn">&times;</button>
      </div>
      <div class="wrong-modal__question" id="qmodal-question"></div>
      <div id="qmodal-options"></div>
      <div class="wrong-modal__explanation" id="qmodal-explanation"></div>
      <div class="wrong-modal__actions">
        <button class="wrong-modal__btn wrong-modal__btn--close" id="qmodal-dismiss-btn">닫기</button>
        <button class="wrong-modal__btn wrong-modal__btn--resolve" id="qmodal-show-answer" style="display:none;">정답 보기</button>
      </div>
    </div>
  </div>

  <!-- 코드 추출용 토스트/패널 -->
  <div id="admin-export-toast"
    style="display: none; position: fixed; bottom: 30px; right: 30px; background: #0A9E72; color: white; padding: 16px 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 3000; align-items: center; gap: 12px;">
    <span>태그 사전이 수정되었습니다. 변경사항을 내보내시겠습니까?</span>
    <button onclick="location.href='admin-tags.html'"
      style="background: white; color: #0A9E72; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;">관리자
      페이지로 이동</button>
  </div>

  <footer class="linear-footer"></footer>

  <!-- 스크립트 -->
  <script src="js/linear-header.js"></script>
  <script type="module" src="js/tag-search.js"></script>
</body>

</html>
