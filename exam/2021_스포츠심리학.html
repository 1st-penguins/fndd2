  <!-- 문제 불러오기 및 퀴즈 로직 -->
  <script type="module">
    import { initializeQuiz, loadQuestion, selectOption, checkAnswer, calculateScore, 
           getIncorrectQuestions, goToNextQuestion, goToPreviousQuestion, 
           submitQuiz } from '../js/quiz/quiz-core.js';
    import { recordQuizData, initAutoSave } from '../js/quiz/quiz-data-recorder.js';
    
    // window 객체에 함수 할당하여 HTML에서 직접 호출 가능하도록 설정
    window.selectOption = (optionIndex) => {
          selectOption(optionIndex);
    };

    window.checkAnswer = () => {
      const result = checkAnswer();
      if (result.status === 'no-answer') {
        alert('답을 선택해주세요.');
        return;
      }

      const feedback = document.getElementById('feedback');
      feedback.className = `answer-feedback ${result.isCorrect ? 'correct-feedback' : 'incorrect-feedback'}`;
      feedback.innerHTML = `
        <div class="feedback-title">
          <span class="feedback-icon">${result.isCorrect ? '✓' : '✗'}</span>
          <span>${result.isCorrect ? '정답입니다!' : '오답입니다!'}</span>
        </div>
        ${!result.isCorrect ? `<div class="correct-answer">정답: ${result.correctAnswer + 1}번</div>` : ''}
        <div class="explanation">${result.explanation}</div>
      `;
      feedback.style.display = 'block';

    // 인디케이터 업데이트
      const indicators = document.querySelectorAll('.indicator');
      if (indicators && window.currentQuestionIndex !== undefined && indicators[window.currentQuestionIndex]) {
        indicators[window.currentQuestionIndex].classList.remove('correct', 'incorrect');
        indicators[window.currentQuestionIndex].classList.add(result.isCorrect ? 'correct' : 'incorrect');
      }
      
      // 학습 분석 데이터 저장
      recordQuizData(result);
      
      return result;
    };

    window.goToNextQuestion = goToNextQuestion;
    window.goToPreviousQuestion = goToPreviousQuestion;
    window.submitQuiz = submitQuiz;
    window.showCurrentAnswer = () => {
      const result = checkAnswer();
      if (result.status === 'no-answer') {
        alert('답을 선택해주세요.');
        return;
      }

      const feedback = document.getElementById('feedback');
      feedback.className = `answer-feedback ${result.isCorrect ? 'correct-feedback' : 'incorrect-feedback'}`;
      feedback.innerHTML = `
        <div class="feedback-title">
          <span class="feedback-icon">${result.isCorrect ? '✓' : '✗'}</span>
          <span>${result.isCorrect ? '정답입니다!' : '오답입니다!'}</span>
        </div>
        ${!result.isCorrect ? `<div class="correct-answer">정답: ${result.correctAnswer + 1}번</div>` : ''}
        <div class="explanation">${result.explanation}</div>
      `;
      feedback.style.display = 'block';
      const indicators = document.querySelectorAll('.indicator');
      if (indicators && window.currentQuestionIndex !== undefined && indicators[window.currentQuestionIndex]) {
        indicators[window.currentQuestionIndex].classList.remove('correct', 'incorrect');
        indicators[window.currentQuestionIndex].classList.add(result.isCorrect ? 'correct' : 'incorrect');
      }
      // 학습 분석 데이터 저장
      recordQuizData(result);
    };
    
    // 페이지 로드 시 퀴즈 초기화
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        console.log('퀴즈 초기화 중...');
        await initializeQuiz();
        
        // 자동 저장 기능 활성화
        initAutoSave();
      } catch (error) {
        console.error('퀴즈 초기화 실패:', error);
        alert('퀴즈를 로드하는 중 오류가 발생했습니다. 페이지를 새로고침해 주세요.');
      }
    });
  </script>

  <!-- 뒤로가기(목록으로) 설정 -->
  <script>
    // Body 태그의 data 속성에서 현재 과목명 읽기
    const currentSubject = document.body.getAttribute('data-current-subject') || "스포츠심리학";

    // URL 파라미터 읽기 함수
    function getParameterByName(name, url = window.location.href) {
      name = name.replace(/[\[\]]/g, '\$&');
      const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
            results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    // 뒤로가기(목록으로) 설정
    document.addEventListener('DOMContentLoaded', function() {
      const prevParam = getParameterByName('prev');   // 'year'?
      const yearParam = getParameterByName('year');   // '2021'?
      
      // 두 번째 nav-link가 '목록으로' 링크입니다
      const backLink = document.querySelector('.back-link'); 
      
      if (backLink) {
        // 만약 prev=year & year=2021 처럼 들어왔다면 → 연도별 페이지로 돌아가기
        if (prevParam === 'year' && yearParam) {
          backLink.href = `../years/year_${yearParam}.html`;
          console.log('목록으로 링크가 연도 페이지로 설정됨:', backLink.href);
        } else {
          // 아니면 과목 페이지로 돌아가기
          const currentSubject = document.body.getAttribute('data-current-subject') || "스포츠심리학";
          backLink.href = `../subjects/subject_${currentSubject}.html`;
          console.log('목록으로 링크가 과목 페이지로 설정됨:', backLink.href);
        }
      } else {
        console.error('목록으로 링크를 찾을 수 없습니다');
      }
    });
  </script>

  <!-- Firebase 인증 상태 감지 (문제 페이지 전용) -->
  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
    import { auth } from "../js/core/firebase-core.js";

    document.addEventListener("DOMContentLoaded", () => {
      onAuthStateChanged(auth, (user) => {
        if (user) {
          console.log("Firebase 인증 상태: 로그인됨", user.displayName || user.email);
          localStorage.setItem("userLoggedIn", "true");
          localStorage.setItem("userName", user.displayName || user.email || "사용자");
        } else {
          console.log("Firebase 인증 상태: 로그아웃됨");
          localStorage.removeItem("userLoggedIn");
          localStorage.removeItem("userName");
        }
      });
    });
  </script>
