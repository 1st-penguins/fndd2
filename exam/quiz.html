  <!-- 문제 불러오기 및 퀴즈 로직 -->
  <script type="module">
    import {
      initializeQuiz,
      loadQuestion,
      selectOption,
      checkAnswer,
      calculateScore,
      getIncorrectQuestions,
      goToNextQuestion,
      goToPreviousQuestion,
      submitQuiz,
      showCurrentAnswer,
      extendedInitializeQuiz
    } from '../js/quiz/quiz-core.js';

    // window 객체에 함수 할당하여 HTML에서 직접 호출 가능하도록 설정
    window.selectOption = (optionIndex) => {
      selectOption(optionIndex);
    };

    window.checkAnswer = () => {
      const result = checkAnswer();
      if (result.status === 'no-answer') {
        alert('답을 선택해주세요.');
        return;
      }

      const feedback = document.getElementById('feedback');
      feedback.className = `answer-feedback ${result.isCorrect ? 'correct-feedback' : 'incorrect-feedback'}`;
      feedback.innerHTML = `
        <div class="feedback-title">
          <span class="feedback-icon">${result.isCorrect ? '✓' : '✗'}</span>
          <span>${result.isCorrect ? '정답입니다!' : '오답입니다!'}</span>
        </div>
        ${!result.isCorrect ? `<div class="correct-answer">정답: ${parseInt(result.correctAnswerText) + 1}번</div>` : ''}
        <div class="explanation">${result.explanation}</div>
      `;
      feedback.style.display = 'block';

      // 인디케이터 업데이트
      const indicators = document.querySelectorAll('.indicator');
      if (indicators && window.currentQuestionIndex !== undefined && indicators[window.currentQuestionIndex]) {
        indicators[window.currentQuestionIndex].classList.remove('correct', 'incorrect');
        indicators[window.currentQuestionIndex].classList.add(result.isCorrect ? 'correct' : 'incorrect');
      }

      // 개별 문제 시도 저장
      try {
        if (typeof window.recordAttempt === 'function') {
          const currentQuestion = window.questions[window.currentQuestionIndex];
          const questionData = {
            year: currentQuestion.year || '2024',
            subject: currentQuestion.subject || document.querySelector('meta[name="quiz-subject"]')?.content || '운동심리학',
            number: window.currentQuestionIndex + 1,
            isFromMockExam: false,
            sessionId: window.sessionManager?.getCurrentSessionId?.() || null,
            correctAnswer: parseInt(result.correctAnswerText) || 0
          };

          window.recordAttempt(questionData, result.userAnswer, result.isCorrect);
        }
      } catch (error) {
        console.error('시도 기록 저장 오류:', error);
      }

      return result;
    };

    window.goToNextQuestion = goToNextQuestion;
    window.goToPreviousQuestion = goToPreviousQuestion;
    window.submitQuiz = submitQuiz;
    window.showCurrentAnswer = () => {
      const result = checkAnswer();
      if (result.status === 'no-answer') {
        alert('답을 선택해주세요.');
        return;
      }

      const feedback = document.getElementById('feedback');
      feedback.className = `answer-feedback ${result.isCorrect ? 'correct-feedback' : 'incorrect-feedback'}`;
      feedback.innerHTML = `
        <div class="feedback-title">
          <span class="feedback-icon">${result.isCorrect ? '✓' : '✗'}</span>
          <span>${result.isCorrect ? '정답입니다!' : '오답입니다!'}</span>
        </div>
        ${!result.isCorrect ? `<div class="correct-answer">정답: ${parseInt(result.correctAnswerText) + 1}번</div>` : ''}
        <div class="explanation">${result.explanation}</div>
      `;
      feedback.style.display = 'block';
    };

    // URL 파라미터 읽기 함수
    function getParameterByName(name, url = window.location.href) {
      name = name.replace(/[\[\]]/g, '\\$&');
      const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

    // 타이틀 설정 함수
    function setQuizTitle(mode, subject, year) {
      const titleElement = document.getElementById('quiz-title-text');
      const subtitleElement = document.getElementById('quiz-subtitle');

      if (mode === 'incorrect') {
        titleElement.textContent = `${subject} 오답 학습`;
        subtitleElement.textContent = '오답노트 학습 모드';
      } else if (mode === 'wrong-review') {
        titleElement.textContent = '오답 복습 퀴즈';
        subtitleElement.textContent = '문제 로딩 중...';
      } else {
        titleElement.textContent = `${year} ${subject} 기출문제`;
        subtitleElement.textContent = '총 문제 수량 로딩 중...';
      }

      // 뒤로가기 링크 설정
      const backLink = document.querySelector('.back-link');
      if (backLink) {
        if (mode === 'incorrect') {
          // 오답노트 모드일 때는 분석 페이지로 이동
          backLink.href = '../index.html#analytics-tab';
        } else if (mode === 'wrong-review') {
          backLink.href = '../wrong-note.html';
        } else {
          // 일반 모드일 때는 과목 페이지로 이동
          backLink.href = `../subjects/subject_${encodeURIComponent(subject)}.html`;
        }
      }
    }

    // 페이지 로드 시 퀴즈 초기화
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        console.log('퀴즈 초기화 중...');

        // URL 파라미터 확인
        const mode = getParameterByName('mode');
        const subject = getParameterByName('subject') || '운동심리학';
        const year = getParameterByName('year') || '2024';

        // 메타 태그에 과목 정보 저장
        const metaSubject = document.createElement('meta');
        metaSubject.name = 'quiz-subject';
        metaSubject.content = subject;
        document.head.appendChild(metaSubject);

        // 메타 태그에 연도 정보 저장
        const metaYear = document.createElement('meta');
        metaYear.name = 'quiz-year';
        metaYear.content = year;
        document.head.appendChild(metaYear);

        // 타이틀 설정
        setQuizTitle(mode, subject, year);

        // 확장된 초기화 함수 호출 (오답노트 모드 지원)
        const initialized = await extendedInitializeQuiz();

        if (initialized) {
          // 초기화 성공 시 로딩 메시지 숨기기
          document.getElementById('loading-message').style.display = 'none';
          document.getElementById('question-wrapper').style.display = 'block';

          // 퀴즈 완료 후 자동으로 뒤로가기 링크를 설정하기 위한 이벤트 리스너
          document.addEventListener('quizCompleted', () => {
            const backLink = document.querySelector('.back-link');
            if (backLink && mode === 'incorrect') {
              backLink.href = '../index.html#analytics-tab';
            }
          });

          // 문제 수량 업데이트
          if (window.questions) {
            const subtitleElement = document.getElementById('quiz-subtitle');
            if (mode === 'incorrect' || mode === 'wrong-review') {
              subtitleElement.textContent = `총 ${window.questions.length}문항 | 오답 복습`;
            } else {
              subtitleElement.textContent = `총 ${window.questions.length}문항 | 제한시간 20분`;
            }
          }
        }
      } catch (error) {
        console.error('퀴즈 초기화 실패:', error);
        document.getElementById('loading-message').innerHTML = `
          <div class="error-message">
            <h3>문제를 불러올 수 없습니다</h3>
            <p>${error.message || '알 수 없는 오류가 발생했습니다.'}</p>
            <button onclick="location.reload()">다시 시도</button>
          </div>
        `;
      }
    });
  </script>

  <!-- Firebase 인증 상태 감지 -->
  <script type="module">
    import { ensureFirebase } from "../js/core/firebase-core.js";

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { auth } = await ensureFirebase();
        const { onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js");
        onAuthStateChanged(auth, (user) => {
          if (user) {
            localStorage.setItem("userLoggedIn", "true");
            localStorage.setItem("userName", user.displayName || user.email || "사용자");
          } else {
            localStorage.removeItem("userLoggedIn");
            localStorage.removeItem("userName");
          }
        });
      } catch (e) {
        console.error("Firebase 인증 초기화 실패:", e);
      }
    });
  </script>
