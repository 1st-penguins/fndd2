  <!-- 인라인 이벤트 핸들러 확인 및 폴백 스크립트 -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 로그인 상태 확인
      const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
      
      // 제한된 콘텐츠 표시 설정
      if (isLoggedIn) {
        document.querySelectorAll('.restricted-content').forEach(el => {
          el.classList.remove('content-blurred');
          el.style.filter = 'none';
          el.style.pointerEvents = 'auto';
        });
      } else {
        document.querySelectorAll('.restricted-content').forEach(el => {
          el.classList.add('content-blurred');
          el.style.filter = 'blur(5px)';
          el.style.pointerEvents = 'none';
        });
        
        // 로그인 모달 표시 준비
        setTimeout(() => {
          const modal = document.getElementById('login-required-modal');
          if (modal) modal.style.display = 'flex';
        }, 500);
      }
      
      // selectOption 폴백 함수
      if (typeof selectOption !== 'function') {
        window.selectOption = function(optionIndex) {
          console.warn('selectOption 함수가 로드되지 않아 임시 함수를 사용합니다.');
          const optionButtons = document.querySelectorAll('.option-button');
          optionButtons.forEach(button => button.classList.remove('selected'));
          optionButtons[optionIndex].classList.add('selected');
        };
      }
      
      // 기타 공통 폴백 함수들
      if (typeof closeLoginModal !== 'function') {
        window.closeLoginModal = function() {
          console.warn('closeLoginModal 함수가 로드되지 않아 임시 함수를 사용합니다.');
          const modal = document.getElementById('login-required-modal');
          if (modal) modal.style.display = 'none';
        };
      }
      
      if (typeof loginAndCloseModal !== 'function') {
        window.loginAndCloseModal = function() {
          console.warn('loginAndCloseModal 함수가 로드되지 않아 임시 함수를 사용합니다.');
          const modal = document.getElementById('login-required-modal');
          if (modal) {
            // 로그인 폼 표시
            const modalContent = modal.querySelector('.login-modal-content');
            if (modalContent) {
              modalContent.innerHTML = `
                <span class="login-modal-close" onclick="closeLoginModal()">&times;</span>
                <div class="login-modal-icon">🔑</div>
                <h3>로그인</h3>
                <div class="login-form">
                  <input type="email" id="login-email" placeholder="이메일" class="login-input">
                  <input type="password" id="login-password" placeholder="비밀번호" class="login-input">
                  <button class="login-now-button" onclick="firebaseEmailLogin()">로그인</button>
                  <button class="login-with-google" onclick="firebaseGoogleLogin()">
                    <span>G</span> Google로 로그인
                  </button>
                  <p class="login-option-text">계정이 없으신가요? <a href="#" onclick="showSignupForm()">회원가입</a></p>
                </div>
              `;
            }
            modal.style.display = 'flex';
          }
        };
      }
      
      console.log('모의고사 페이지 이벤트 핸들러 보호 스크립트가 로드되었습니다.');
    });

  <!-- Firebase 인증 상태 감지 (문제 페이지 전용) -->
  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
    import { auth, ensureFirebase } from "../js/core/firebase-core.js";

    // DOM이 완전히 로드된 후 실행
    document.addEventListener("DOMContentLoaded", async () => {
      // Firebase 초기화 확인
      try {
        await ensureFirebase();
      } catch (error) {
        console.error('Firebase 초기화 오류:', error);
        return;
      }
      
      // auth 객체 확인
      if (!auth) {
        console.error('Firebase auth 객체를 찾을 수 없습니다.');
        return;
      }
      
      onAuthStateChanged(auth, (user) => {
        if (user) {
          console.log("Firebase 인증 상태: 로그인됨", user.displayName || user.email);
          localStorage.setItem("userLoggedIn", "true");
          localStorage.setItem("userName", user.displayName || user.email || "사용자");
          
          // 전역에 updateLoginUI 함수가 정의되어 있으면 호출
          if (typeof updateLoginUI === "function") {
            updateLoginUI(user);
          } else {
            // 수동으로 UI 업데이트
            document.querySelectorAll('.restricted-content').forEach(el => {
              el.classList.remove('content-blurred');
              el.style.filter = 'none';
              el.style.pointerEvents = 'auto';
            });
            
            // 모달 닫기
            const modal = document.getElementById('login-required-modal');
            if (modal) modal.style.display = 'none';
          }
        } else {
          console.log("Firebase 인증 상태: 로그아웃됨");
          localStorage.removeItem("userLoggedIn");
          localStorage.removeItem("userName");
          
          // 제한 페이지에서 홈으로 리디렉션하지 않고 모달 표시
          if (typeof updateLoginUI === "function") {
            updateLoginUI(null);
          } else {
            // 수동으로 UI 업데이트
            document.querySelectorAll('.restricted-content').forEach(el => {
              el.classList.add('content-blurred');
              el.style.filter = 'blur(5px)';
              el.style.pointerEvents = 'none';
            });
            
            // 모달 표시
            const modal = document.getElementById('login-required-modal');
            if (modal) modal.style.display = 'flex';
          }
        }
      });
    });
  </script>
