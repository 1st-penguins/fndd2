<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />

  <meta property="og:type" content="website">
  <meta property="og:title" content="로그인 | 퍼스트펭귄">
  <meta property="og:description" content="퍼스트펭귄에 로그인하고 학습 기록 저장, 분석 기능을 이용하세요.">
  <meta property="og:url" content="https://the1stpeng.com/login.html">
  <meta property="og:image" content="https://the1stpeng.com/images/firstpenguin-logo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="로그인 | 퍼스트펭귄">
  <meta name="twitter:description" content="퍼스트펭귄에 로그인하고 학습 기록 저장, 분석 기능을 이용하세요.">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1D2F4E">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="//www.gstatic.com">

  <link rel="stylesheet" href="css/linear-header.css" />
  <link rel="stylesheet" href="css/linear-footer.css" />
  <link rel="stylesheet" href="css/layout.css" />

  <link rel="stylesheet" href="css/login.css" />

  <!-- Firebase SDK -->
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>

  <!-- 코어 모듈 -->
  <script type="module" src="js/core/firebase-core.js"></script>
  <script type="module" src="js/auth/auth-core.js"></script>
  <script type="module" src="js/auth/auth-ui.js"></script>
  <script type="module" src="js/auth/auth-utils.js"></script>

  <!-- 헤더 스크립트 -->
  <script src="js/linear-header.js"></script>

  <!-- 페이지 전용 스크립트 -->
  <script type="module" src="js/login-page.js"></script>

  <!-- 브라우저 리다이렉트 스크립트 -->
  <script type="module">
    import { initBrowserRedirect } from "/js/utils/browser-redirect.js";
    initBrowserRedirect();
  </script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 80px;
      /* 프리미엄 메인 배경 그라디언트 */
      background:
        radial-gradient(circle at 10% 20%, rgba(95, 178, 201, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(29, 47, 78, 0.05) 0%, transparent 50%),
        #f8f9fa;
    }

    .login-container {
      max-width: 480px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-premium);
      padding: 56px 40px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: premium-fade-in-up 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .login-container h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--penguin-navy);
      margin-bottom: 12px;
    }

    .login-container>p {
      font-size: 1.125rem;
      color: var(--deep-sea-gray);
      margin-bottom: 48px;
      line-height: 1.5;
    }

    .login-options {
      display: flex;
      flex-direction: column;
      gap: 32px;
      margin-bottom: 40px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.4);
      padding: 24px;
      border-radius: var(--radius-premium);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-card:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: var(--penguin-skyblue);
      transform: translateY(-4px);
    }

    .login-card h2 {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--penguin-navy);
      margin-bottom: 20px;
    }

    /* btn-premium (base.css/premium-ui.css에서 상속받거나 재정의) */
    .login-button {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.125rem;
      font-weight: 650;
    }

    .google-login {
      background: white;
      color: #3C4043;
      border: 1px solid #DADCE0;
    }

    .google-login:hover {
      background: #F8F9FA;
      border-color: #DADCE0;
      box-shadow: 0 1px 3px rgba(60, 64, 67, 0.3), 0 4px 8px 3px rgba(60, 64, 67, 0.15);
    }

    .login-help {
      font-size: 0.9375rem;
      color: var(--deep-sea-gray);
      margin-top: 32px;
    }

    .login-help a {
      color: var(--penguin-skyblue);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .login-help a:hover {
      color: var(--penguin-navy);
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-main {
        padding: 100px 16px 60px;
      }

      .login-container {
        padding: 40px 24px;
      }

      .login-container h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <!-- Linear Header -->
  <header class="linear-header" id="linear-header">
    <div class="linear-header__container">
      <a href="index.html" class="linear-header__brand">
        <div class="linear-header__logo">
          <img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄 로고" />
        </div>
        <span class="linear-header__brand-text">퍼스트펭귄</span>
        <span class="cert-badge" id="header-cert-badge">건강운동관리사</span>
      </a>

      <nav class="linear-header__nav">
        <ul class="linear-header__nav-list">
          <li class="linear-header__nav-item">
            <a href="index.html" class="linear-header__nav-link">홈</a>
          </li>
          <li class="linear-header__nav-item">
            <a href="notices.html" class="linear-header__nav-link">공지사항</a>
          </li>
          <li class="linear-header__nav-item">
            <a href="index.html#quiz-tab" class="linear-header__nav-link">문제풀기</a>
          </li>
          <li class="linear-header__nav-item">
            <a href="https://litt.ly/the1stpeng" target="_blank" rel="noopener noreferrer" class="linear-header__nav-link">강의</a>
          </li>
        </ul>
      </nav>

      <!-- 로그인/로그아웃을 별도 영역으로 분리 -->
      <div class="linear-header__auth">
        <!-- 로그인 전 상태 -->
        <a href="#" class="linear-header__nav-link linear-header__nav-link--active" data-action="show-login"
          id="login-link">
          로그인
        </a>

        <!-- 로그인 후 상태 (JavaScript로 동적 생성) -->
        <div id="user-profile-container" style="display: none;">
          <div class="linear-header__user-profile">
            <div class="linear-header__user-avatar" id="user-avatar">U</div>
            <span class="linear-header__user-name" id="user-name">사용자</span>
          </div>
          <a href="#" class="linear-header__nav-link" data-action="logout">
            로그아웃
          </a>
        </div>
      </div>

      <div class="linear-header__actions">
        <!-- 개발 모드 토글 (개발 환경에서만 표시) -->
        <div id="dev-mode-toggle" class="dev-mode-toggle" style="display: none;">
          <button id="dev-mode-btn" class="dev-mode-btn">
            <span class="dev-mode-indicator"></span>
            DEV
          </button>
        </div>

        <button class="linear-header__mobile-toggle" id="mobile-toggle">
          <span class="linear-header__mobile-toggle-line"></span>
          <span class="linear-header__mobile-toggle-line"></span>
          <span class="linear-header__mobile-toggle-line"></span>
        </button>
      </div>
    </div>

    <!-- 모바일 메뉴 -->
    <div class="linear-header__mobile-menu" id="mobile-menu">
      <div class="mobile-cert-badge" id="mobile-cert-badge">
        <span class="mobile-cert-badge__label">현재 선택</span>
        <span class="mobile-cert-badge__name">건강운동관리사</span>
      </div>
      <a href="index.html" class="linear-header__nav-link">홈</a>
      <a href="notices.html" class="linear-header__nav-link">공지사항</a>
      <a href="index.html#quiz-tab" class="linear-header__nav-link">문제풀기</a>
      <a href="https://litt.ly/the1stpeng" target="_blank" rel="noopener noreferrer" class="linear-header__nav-link">강의</a>
    </div>
  </header>

  <main class="login-main">
    <div class="login-container">
      <h1>🐧 로그인</h1>
      <p>퍼스트펭귄 서비스를 이용하려면 로그인이 필요합니다.</p>

      <!-- 현재 로그인된 사용자 정보가 표시될 영역 -->
      <div id="current-user-info"></div>

      <div class="login-options">
        <div class="login-card">
          <h2>📧 이메일로 로그인</h2>
          <button id="email-login-button" class="login-button btn-premium email-login" data-action="show-email-login">
            이메일로 로그인
          </button>
        </div>

        <div class="login-card">
          <h2>🌐 소셜 계정으로 로그인</h2>
          <button id="google-login-button" class="login-button btn-premium google-login" data-action="google-login">
            <span class="icon">G</span> Google로 로그인
          </button>
        </div>
      </div>

      <p class="login-help">
        계정이 없으신가요? <a href="#" data-action="show-signup">회원가입</a>
      </p>
    </div>
  </main>

  <!-- Linear Footer (Simple) -->
  <footer class="linear-footer"></footer>

  <!-- Certificate Badge 업데이트 -->
  <script type="module">
    import { getCurrentCertificateType, getCertificateName } from './js/utils/certificate-utils.js';

    // 페이지 로드 시 cert-badge 업데이트
    document.addEventListener('DOMContentLoaded', () => {
      const certType = getCurrentCertificateType();
      const certName = getCertificateName(certType);

      // 헤더 배지 업데이트
      const headerBadge = document.getElementById('header-cert-badge');
      if (headerBadge) {
        headerBadge.textContent = certName;
      }

      // 모바일 배지 업데이트
      const mobileBadge = document.querySelector('#mobile-cert-badge .mobile-cert-badge__name');
      if (mobileBadge) {
        mobileBadge.textContent = certName;
      }

      // 테마 색상 적용
      const root = document.documentElement;
      if (certType === 'health-manager') {
        root.style.setProperty('--cert-primary', '#1D2F4E');
        root.style.setProperty('--cert-primary-dark', '#162740');
        root.style.setProperty('--cert-primary-light', '#2a4570');
      } else if (certType === 'sports-instructor') {
        root.style.setProperty('--cert-primary', '#059669');
        root.style.setProperty('--cert-primary-dark', '#047857');
        root.style.setProperty('--cert-primary-light', '#10b981');
      }
    });
  </script>

  <!-- 개발 모드 토글 -->
  <script type="module" src="js/dev-mode-toggle.js"></script>
</body>

</html>
