<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퍼스트펭귄 — 체육 자격증 기출문제</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/design-tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-family: var(--font-sans);
      background: #ffffff;
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--page-margin);
      background: var(--color-bg-translucent);
      backdrop-filter: saturate(180%) blur(var(--header-blur));
      -webkit-backdrop-filter: saturate(180%) blur(var(--header-blur));
      border-bottom: 1px solid var(--color-separator);
      z-index: var(--z-header);
    }

    .header__brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .header__logo {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-xs);
      object-fit: contain;
    }

    .header__name {
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-normal);
      color: var(--color-text-primary);
    }

    .header__login {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
      padding: var(--space-1) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      transition: var(--transition-colors), var(--transition-shadow);
    }

    .header__login:hover {
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    /* ── Main ── */
    .main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px var(--page-margin);
    }

    .hero__headline {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #1D1D1F;
      text-align: center;
      margin-bottom: 12px;
    }

    .main__title {
      font-size: 20px;
      font-weight: 500;
      color: #86868b;
      letter-spacing: -0.01em;
      text-align: center;
      margin-bottom: 40px;
    }

    /* ── Exam Cards ── */
    .exams {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      max-width: 520px;
    }

    .exam-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-6) var(--space-8);
      background: var(--color-bg-elevated);
      border-radius: var(--radius-lg);
      box-shadow: var(--card-shadow);
      border: var(--card-border, none);
      transition: var(--transition-all);
      cursor: pointer;
    }

    .exam-card:hover {
      box-shadow: var(--card-shadow-hover);
      transform: translateY(-2px);
    }

    .exam-card:hover .exam-card__name {
      color: #F4511E;
    }

    .exam-card:hover .exam-card__arrow {
      color: #F4511E;
      transform: translateX(4px);
    }

    .exam-card__name {
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-tight);
      color: var(--color-text-primary);
      transition: color var(--duration-fast) var(--ease-default);
    }

    .exam-card__arrow {
      font-size: var(--text-lg);
      color: var(--color-text-quaternary);
      transition: color var(--duration-fast) var(--ease-default),
                  transform var(--duration-normal) var(--ease-out);
    }

    /* ── Footer ── */
    .footer {
      padding: var(--space-8) var(--page-margin);
      text-align: center;
      border-top: 1px solid var(--color-separator);
    }

    .footer__text {
      font-size: var(--typo-caption-size);
      color: var(--typo-caption-color);
      letter-spacing: var(--tracking-normal);
    }

    /* ── Responsive ── */
    @media (max-width: 734px) {
      .hero__headline {
        font-size: 48px;
      }

      .main__title {
        font-size: 17px;
        margin-bottom: 36px;
      }

      .exam-card {
        padding: var(--space-5) var(--space-6);
      }

      .exam-card__name {
        font-size: var(--text-lg);
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="landing.html" class="header__brand">
      <img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄" class="header__logo">
      <span class="header__name">퍼스트펭귄</span>
    </a>
    <a href="login.html" class="header__login">로그인</a>
  </header>

  <main class="main">
    <h1 class="hero__headline">Pass or Nothing.</h1>
    <p class="main__title">어떤 시험을 준비하고 있나요?</p>

    <div class="exams">
      <a href="es.html" class="exam-card">
        <span class="exam-card__name">건강운동관리사</span>
        <span class="exam-card__arrow">→</span>
      </a>
      <a href="sports1.html" class="exam-card">
        <span class="exam-card__name">1급 스포츠지도사</span>
        <span class="exam-card__arrow">→</span>
      </a>
      <a href="sports2.html" class="exam-card">
        <span class="exam-card__name">2급 스포츠지도사</span>
        <span class="exam-card__arrow">→</span>
      </a>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__text">© 2025 퍼스트펭귄</p>
  </footer>

</body>
</html>
