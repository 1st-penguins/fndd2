[build]
  # 정적 사이트이므로 빌드 과정 없음
  publish = "."

# 리디렉션 설정
[[redirects]]
  # SPA 라우팅을 위한 설정 (필요한 경우)
  from = "/app/*"
  to = "/index.html"
  status = 200

# 환경 변수
[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "development"

[context.branch-deploy.environment]
  NODE_ENV = "development"

# 폼 처리 설정 (필요한 경우)
[[forms]]
  name = "contact"
