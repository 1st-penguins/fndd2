<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 | 퍼스트펭귄</title>
  
  <link rel="stylesheet" href="css/base.css" />
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    .fail-container {
      background: white;
      border-radius: 20px;
      padding: 60px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .fail-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #f44336;
      margin-bottom: 20px;
    }
    
    .message {
      color: #666;
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 30px;
    }
    
    .btn {
      padding: 15px 40px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: var(--penguin-navy);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--penguin-skyblue);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="fail-container">
    <div class="fail-icon">❌</div>
    <h1>결제에 실패했습니다</h1>
    <div class="message">
      결제 처리 중 문제가 발생했습니다.<br>
      다시 시도해주세요.
    </div>
    
    <button class="btn btn-primary" onclick="window.open('https://litt.ly/the1stpeng','_blank')">
      📚 강의 목록으로
    </button>
  </div>
</body>
</html>
