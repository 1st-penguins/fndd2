    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="dns-prefetch" href="//www.gstatic.com">
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/linear-header.css">
    <link rel="stylesheet" href="css/linear-footer.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/wrong-note.css">
    <link rel="stylesheet" href="css/linear-themes.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <style>
        .wrong-note-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 16px 32px;
            min-height: 60vh;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .wrong-note-container {
                padding: 70px 12px 32px;
            }

            .page-title {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <header class="linear-header" id="linear-header">
        <div class="linear-header__container">
            <a href="index.html" class="linear-header__brand">
                <div class="linear-header__logo">
                    <img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄 로고" width="36" height="36" />
                </div>
                <span class="linear-header__brand-text">퍼스트펭귄</span>
            </a>

            <nav class="linear-header__nav">
                <ul class="linear-header__nav-list">
                    <li class="linear-header__nav-item">
                        <a href="index.html" class="linear-header__nav-link">홈</a>
                    </li>
                    <li class="linear-header__nav-item">
                        <a href="https://litt.ly/the1stpeng" target="_blank" rel="noopener noreferrer" class="linear-header__nav-link">강의</a>
                    </li>
                    <li class="linear-header__nav-item">
                        <a href="notices.html" class="linear-header__nav-link">공지사항</a>
                    </li>
                </ul>
            </nav>

            <div class="linear-header__auth">
                <div id="login-button-container">
                    <a href="#" class="linear-header__nav-link" data-action="show-login" id="login-link">로그인</a>
                </div>
                <div id="user-profile-container" class="linear-header__user-profile" style="display: none;">
                    <div class="linear-header__user-profile">
                        <div class="linear-header__user-avatar" id="user-avatar">U</div>
                        <span class="linear-header__user-name" id="user-name">사용자</span>
                    </div>
                    <a href="#" class="linear-header__nav-link" data-action="logout">로그아웃</a>
                </div>
            </div>

            <div class="linear-header__actions">
                <button class="linear-header__mobile-toggle" id="mobile-toggle" aria-label="메뉴">
                    <span class="linear-header__mobile-toggle-line"></span>
                    <span class="linear-header__mobile-toggle-line"></span>
                    <span class="linear-header__mobile-toggle-line"></span>
                </button>
            </div>
        </div>

        <div class="linear-header__mobile-menu" id="mobile-menu">
            <a href="index.html" class="linear-header__nav-link">홈</a>
            <a href="notices.html" class="linear-header__nav-link">공지사항</a>
            <a href="index.html#quiz-tab" class="linear-header__nav-link">문제풀기</a>
            <a href="https://litt.ly/the1stpeng" target="_blank" rel="noopener noreferrer" class="linear-header__nav-link">강의</a>
            <div class="mobile-menu-auth">
                <a href="#" class="linear-header__nav-link" data-action="show-login" id="mobile-login-link">로그인</a>
                <div id="mobile-user-profile-container" style="display: none;">
                    <div class="mobile-user-info">
                        <div class="linear-header__user-avatar" id="mobile-user-avatar">U</div>
                        <span class="linear-header__user-name" id="mobile-user-name">사용자</span>
                    </div>
                    <a href="#" class="linear-header__nav-link" data-action="logout" id="mobile-logout-link">로그아웃</a>
                </div>
            </div>
        </div>
    </header>

    <main class="wrong-note-container">
        <div class="page-header">
            <h1 class="page-title">오답 노트</h1>
            <p class="page-subtitle">틀렸던 문제를 다시 확인하고 완벽하게 내 것으로 만드세요.</p>
        </div>

        <div id="wrong-note-root">
          <div class="wrong-note-controls-bar">
            <div class="wrong-note-filter-group" id="subject-filters">
              <button class="wrong-note-filter-btn active" data-subject="all">전체</button>
            </div>
            <div class="wrong-note-controls-right">
              <span class="wrong-note-stats-summary">총 <strong id="total-wrong-count">0</strong>문제</span>
              <button class="wrong-note-select-mode-btn" id="select-mode-btn">선택</button>
            </div>
          </div>

          <div class="wrong-note-action-bar" id="action-bar">
            <div class="wrong-note-action-bar__left">
              <span id="selected-count">0개 선택됨</span>
              <button class="wrong-note-action-bar__btn wrong-note-action-bar__btn--cancel" id="cancel-select-btn">취소</button>
            </div>
            <div style="display: flex; gap: 8px;">
              <button class="wrong-note-action-bar__btn wrong-note-action-bar__btn--resolve" id="resolve-selected-btn">이해 완료</button>
              <button class="wrong-note-action-bar__btn wrong-note-action-bar__btn--quiz" id="quiz-selected-btn" disabled>다시 풀기</button>
            </div>
          </div>

          <div id="wrong-list-container">
            <div style="text-align:center; padding:40px; color:var(--text-secondary);">로딩 중...</div>
          </div>
        </div>
    </main>

    <!-- 상세 모달 -->
    <div class="wrong-modal-overlay" id="wrong-detail-modal">
        <div class="wrong-modal">
            <div class="wrong-modal__header">
                <span class="wrong-modal__title" id="modal-title">문제 확인</span>
                <button class="wrong-modal__close" id="modal-close-btn">&times;</button>
            </div>
            <div class="wrong-modal__question" id="modal-question"></div>
            <div id="modal-options"></div>
            <div class="wrong-modal__explanation" id="modal-explanation"></div>
            <div class="wrong-modal__actions">
                <button class="wrong-modal__btn wrong-modal__btn--close" id="modal-dismiss-btn">닫기</button>
                <button class="wrong-modal__btn wrong-modal__btn--resolve" id="modal-resolve-btn">이해 완료 (목록에서 제거)</button>
            </div>
        </div>
    </div>

    <footer class="linear-footer"></footer>

    <script type="module" src="js/core/firebase-core.js"></script>
    <script type="module" src="js/auth/auth-utils.js"></script>
    <script type="module" src="js/auth/auth-ui.js"></script>
    <script type="module" src="js/auth/auth-core.js"></script>
    <script src="js/linear-header.js"></script>
    <script src="js/utils/theme-manager.js"></script>
    <script type="module" src="js/quiz/wrong-note-ui.js"></script>
</body>

</html>
