    <style>
        .wrong-note-container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 16px;
            min-height: 60vh;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 컨트롤 바 */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color, #e2e8f0);
            border-radius: 20px;
            background: white;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .filter-btn.active {
            background: var(--penguin-navy);
            color: white;
            border-color: var(--penguin-navy);
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stats-summary {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 액션 바 (선택 모드) */
        .action-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            padding: 12px 16px;
            background: var(--penguin-navy);
            border-radius: 12px;
            color: white;
        }

        .action-bar.visible {
            display: flex;
        }

        .action-bar__left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .action-bar__btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-bar__btn--quiz {
            background: var(--penguin-skyblue);
            color: white;
        }

        .action-bar__btn--quiz:hover {
            background: #4da0b8;
        }

        .action-bar__btn--quiz:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .action-bar__btn--resolve {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .action-bar__btn--resolve:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .action-bar__btn--cancel {
            background: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
        }

        .select-mode-btn {
            padding: 6px 14px;
            border: 1px solid var(--penguin-navy);
            border-radius: 8px;
            background: white;
            color: var(--penguin-navy);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .select-mode-btn:hover {
            background: var(--penguin-navy);
            color: white;
        }

        /* 과목별 섹션 */
        .subject-section {
            margin-bottom: 20px;
        }

        .subject-section__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f8fafc;
            border-radius: 10px 10px 0 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .subject-section__title {
            font-size: 14px;
            font-weight: 700;
            color: var(--penguin-navy);
        }

        .subject-section__count {
            font-size: 12px;
            color: var(--text-secondary);
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* 컴팩트 리스트 아이템 */
        .wrong-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background 0.15s;
        }

        .wrong-item:last-child {
            border-bottom: none;
            border-radius: 0 0 10px 10px;
        }

        .wrong-item:hover {
            background: #f8fafc;
        }

        .wrong-item__checkbox {
            display: none;
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            transition: all 0.15s;
        }

        .wrong-item__checkbox:checked {
            background: var(--penguin-navy);
            border-color: var(--penguin-navy);
        }

        .wrong-item__checkbox:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .select-mode .wrong-item__checkbox {
            display: block;
        }

        .wrong-item__number {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--penguin-navy);
        }

        .wrong-item__info {
            flex: 1;
            min-width: 0;
        }

        .wrong-item__title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .wrong-item__meta {
            display: flex;
            gap: 8px;
            margin-top: 2px;
            font-size: 11px;
            color: var(--text-secondary, #94a3b8);
        }

        .wrong-item__count {
            flex-shrink: 0;
            font-size: 11px;
            color: #ef4444;
            font-weight: 600;
            background: #fef2f2;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .wrong-item__arrow {
            flex-shrink: 0;
            color: #cbd5e1;
            font-size: 14px;
        }

        .select-mode .wrong-item__arrow {
            display: none;
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .loading-spinner-container {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        /* 상세 모달 */
        .wrong-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .wrong-modal-overlay.open {
            display: flex;
        }

        .wrong-modal {
            background: white;
            padding: 24px;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .wrong-modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .wrong-modal__title {
            font-size: 16px;
            font-weight: 700;
            color: var(--penguin-navy);
        }

        .wrong-modal__close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
            padding: 4px;
        }

        .wrong-modal__question {
            font-weight: 600;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .wrong-modal__question img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }

        .wrong-modal__option {
            margin: 6px 0;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .wrong-modal__option.correct {
            background: #f0fdf4;
            border-color: #86efac;
            font-weight: 600;
        }

        .wrong-modal__explanation {
            background: #f8fafc;
            padding: 14px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.6;
            color: #475569;
        }

        .wrong-modal__explanation strong {
            display: block;
            margin-bottom: 6px;
            color: var(--penguin-navy);
        }

        .wrong-modal__actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .wrong-modal__btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .wrong-modal__btn--resolve {
            background: var(--penguin-navy);
            color: white;
        }

        .wrong-modal__btn--close {
            background: #f1f5f9;
            color: var(--text-secondary);
        }

        /* 과목 섹션 그림자 */
        .subject-section {
            background: white;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        @media (max-width: 480px) {
            .wrong-note-container {
                padding: 0 12px;
                margin: 20px auto;
            }

            .page-title {
                font-size: 18px;
            }

            .controls-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .wrong-item {
                padding: 10px 12px;
                gap: 10px;
            }

            .wrong-item__title {
                font-size: 13px;
            }

            .action-bar {
                flex-direction: column;
                gap: 10px;
            }

            .action-bar__left {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>

                    <img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄 로고" width="36" height="36" />
                </div>

            <nav class="linear-header__nav">
                <ul class="linear-header__nav-list">

                    </div>
                    <a href="#" class="linear-header__nav-link" data-action="logout">로그아웃</a>
                </div>
            </div>

            <div class="linear-header__actions">
                <button class="linear-header__mobile-toggle" id="mobile-toggle" aria-label="메뉴">
                    <span class="linear-header__mobile-toggle-line"></span>

        <div class="linear-header__mobile-menu" id="mobile-menu">

                <a href="#" class="linear-header__nav-link" data-action="show-login" id="mobile-login-link">로그인</a>

                    <div class="mobile-user-info">
                        <div class="linear-header__user-avatar" id="mobile-user-avatar">U</div>

            </div>
        </div>
    </header>

    <main class="wrong-note-container" id="wrong-note-root">
        <div class="page-header">
            <h1 class="page-title">오답 노트</h1>
            <p class="page-subtitle">틀렸던 문제를 다시 확인하고 완벽하게 내 것으로 만드세요.</p>
        </div>

        <div class="controls-bar">
            <div class="filter-group" id="subject-filters">
                <button class="filter-btn active" data-subject="all">전체</button>
            </div>
            <div class="controls-right">
                <span class="stats-summary">총 <strong id="total-wrong-count">0</strong>문제</span>
                <button class="select-mode-btn" id="select-mode-btn">선택</button>
            </div>
        </div>

        <!-- 선택 모드 액션 바 -->
        <div class="action-bar" id="action-bar">
            <div class="action-bar__left">
                <span id="selected-count">0개 선택됨</span>
                <button class="action-bar__btn action-bar__btn--cancel" id="cancel-select-btn">취소</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="action-bar__btn action-bar__btn--resolve" id="resolve-selected-btn">이해 완료</button>
                <button class="action-bar__btn action-bar__btn--quiz" id="quiz-selected-btn" disabled>다시 풀기</button>
            </div>
        </div>

        <div id="wrong-list-container">
            <div class="loading-spinner-container">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- 상세 모달 -->
    <div class="wrong-modal-overlay" id="wrong-detail-modal">
        <div class="wrong-modal">
            <div class="wrong-modal__header">
                <span class="wrong-modal__title" id="modal-title">문제 확인</span>
                <button class="wrong-modal__close" id="modal-close-btn">&times;</button>
            </div>
            <div class="wrong-modal__question" id="modal-question"></div>
            <div id="modal-options"></div>
            <div class="wrong-modal__explanation" id="modal-explanation"></div>
            <div class="wrong-modal__actions">
                <button class="wrong-modal__btn wrong-modal__btn--close" id="modal-dismiss-btn">닫기</button>
                <button class="wrong-modal__btn wrong-modal__btn--resolve" id="modal-resolve-btn">이해 완료 (목록에서 제거)</button>
            </div>
        </div>
    </div>

    <footer class="linear-footer"></footer>

    <script type="module" src="js/core/firebase-core.js"></script>
    <script type="module" src="js/auth/auth-utils.js"></script>
