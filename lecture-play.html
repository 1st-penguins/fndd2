<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강의 수강 | 퍼스트펭귄</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="canonical" href="https://the1stpeng.com/lecture-play.html">
  <meta name="description" content="퍼스트펭귄 온라인 강의를 수강하세요.">
  <meta name="robots" content="noindex">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/linear-header.css">
  <link rel="stylesheet" href="css/linear-footer.css">
  <link rel="stylesheet" href="css/layout.css">

  <!-- Vimeo Player API -->
  <script src="https://player.vimeo.com/api/player.js"></script>

  <!-- Firebase -->
  <script type="module" src="js/core/firebase-core.js"></script>
  <script type="module" src="js/auth/auth-core.js"></script>

  <!-- 헤더 스크립트 -->
  <script src="js/linear-header.js"></script>

  <style>
    .play-container {
      max-width: 1200px;
      margin: 80px auto 60px;
      padding: 0 16px;
    }

    .play-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--penguin-navy);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 20px;
      transition: color 0.2s;
    }
    .play-back:hover { color: var(--penguin-skyblue); }

    .play-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    /* 비디오 영역 */
    .play-video {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .play-video__wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }
    .play-video__wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* 강의 정보 */
    .play-info {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .play-info__title {
      font-size: 22px;
      font-weight: 800;
      color: var(--penguin-navy);
      margin-bottom: 4px;
    }
    .play-info__episode {
      font-size: 14px;
      color: var(--deep-sea-gray);
      margin-bottom: 16px;
    }

    /* 진도율 */
    .play-progress { margin-bottom: 16px; }
    .play-progress__label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--deep-sea-gray);
      margin-bottom: 6px;
    }
    .play-progress__bar {
      width: 100%;
      height: 6px;
      background: #e9ecef;
      border-radius: 3px;
      overflow: hidden;
    }
    .play-progress__fill {
      height: 100%;
      background: var(--penguin-skyblue);
      transition: width 0.3s;
      border-radius: 3px;
    }

    /* 에피소드 목록 */
    .play-episodes {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .play-episodes__title {
      font-size: 16px;
      font-weight: 700;
      color: var(--penguin-navy);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }
    .play-ep-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .play-ep-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid #f8f9fa;
    }
    .play-ep-item:hover { background: #f8f9fa; }
    .play-ep-item.active {
      background: rgba(95, 178, 201, 0.1);
      border-color: transparent;
    }
    .play-ep-item__num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      background: #f1f3f5;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--penguin-navy);
    }
    .play-ep-item.active .play-ep-item__num {
      background: var(--penguin-skyblue);
      color: white;
    }
    .play-ep-item__info { flex: 1; min-width: 0; }
    .play-ep-item__title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .play-ep-item__duration {
      font-size: 12px;
      color: #adb5bd;
    }
    .play-ep-item__playing {
      font-size: 11px;
      color: var(--penguin-skyblue);
      font-weight: 700;
    }

    /* 접근 거부 */
    .play-denied {
      text-align: center;
      padding: 80px 20px;
    }
    .play-denied__icon { font-size: 64px; margin-bottom: 16px; }
    .play-denied__title { font-size: 22px; font-weight: 700; color: var(--penguin-navy); margin-bottom: 12px; }
    .play-denied__text { color: var(--deep-sea-gray); margin-bottom: 24px; }
    .play-denied__btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--penguin-navy);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
    }
    .play-denied__btn:hover {
      background: var(--penguin-skyblue);
      transform: translateY(-2px);
    }

    /* 로딩 */
    .play-loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--deep-sea-gray);
    }

    /* 반응형 */
    @media (min-width: 900px) {
      .play-layout {
        grid-template-columns: 1fr 320px;
      }
      .play-video { grid-column: 1; grid-row: 1; }
      .play-info { grid-column: 1; grid-row: 2; }
      .play-episodes { grid-column: 2; grid-row: 1 / 3; max-height: 600px; overflow-y: auto; }
    }

    @media (max-width: 480px) {
      .play-container { margin: 70px auto 40px; }
      .play-info__title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <!-- Linear Header -->
  <header class="linear-header" id="linear-header">
    <div class="linear-header__container">
      <a href="index.html" class="linear-header__brand">
        <div class="linear-header__logo"><img src="/images/firstpenguin-logo3.png" alt="퍼스트펭귄 로고"></div>
        <span class="linear-header__brand-text">퍼스트펭귄</span>
      </a>
      <nav class="linear-header__nav">
        <ul class="linear-header__nav-list">
          <li class="linear-header__nav-item"><a href="index.html" class="linear-header__nav-link">홈</a></li>
          <li class="linear-header__nav-item"><a href="notices.html" class="linear-header__nav-link">공지사항</a></li>
          <li class="linear-header__nav-item"><a href="index.html#quiz-tab" class="linear-header__nav-link">문제풀기</a></li>
          <li class="linear-header__nav-item"><a href="index.html#lecture-tab" class="linear-header__nav-link linear-header__nav-link--active">강의</a></li>
        </ul>
      </nav>
      <div class="linear-header__auth">
        <a href="#" class="linear-header__nav-link" data-action="show-login" id="login-link">로그인</a>
        <div id="user-profile-container" style="display:none;">
          <div class="linear-header__user-profile">
            <div class="linear-header__user-avatar" id="user-avatar">U</div>
            <span class="linear-header__user-name" id="user-name">사용자</span>
          </div>
          <a href="#" class="linear-header__nav-link" data-action="logout">로그아웃</a>
        </div>
      </div>
      <div class="linear-header__actions">
        <button class="linear-header__mobile-toggle" id="mobile-toggle">
          <span class="linear-header__mobile-toggle-line"></span><span class="linear-header__mobile-toggle-line"></span><span class="linear-header__mobile-toggle-line"></span>
        </button>
      </div>
    </div>
    <div class="linear-header__mobile-menu" id="mobile-menu">
      <a href="index.html" class="linear-header__nav-link">홈</a>
      <a href="notices.html" class="linear-header__nav-link">공지사항</a>
      <a href="index.html#quiz-tab" class="linear-header__nav-link">문제풀기</a>
      <a href="index.html#lecture-tab" class="linear-header__nav-link">강의</a>
    </div>
  </header>

  <main class="play-container">
    <!-- 로딩 -->
    <div id="play-loading" class="play-loading">
      <div style="width:36px;height:36px;border:3px solid #e9ecef;border-top-color:var(--penguin-skyblue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;"></div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      <div>강의를 불러오는 중...</div>
    </div>

    <!-- 접근 거부 -->
    <div id="play-denied" class="play-denied" style="display:none;">
      <div class="play-denied__icon">🔒</div>
      <h1 class="play-denied__title">접근 권한이 없습니다</h1>
      <p class="play-denied__text">이 강의를 시청하려면 먼저 구매해주세요.</p>
      <a id="play-denied-btn" href="index.html#lecture-tab" class="play-denied__btn">강의 구매하기</a>
    </div>

    <!-- 강의 플레이어 -->
    <div id="play-content" style="display:none;">
      <a id="play-back-link" href="index.html#lecture-tab" class="play-back">← 상품 상세로</a>

      <div class="play-layout">
        <!-- 비디오 -->
        <div class="play-video">
          <div class="play-video__wrapper" id="video-container"></div>
        </div>

        <!-- 강의 정보 -->
        <div class="play-info">
          <h1 class="play-info__title" id="play-title">강의 제목</h1>
          <p class="play-info__episode" id="play-episode-info"></p>
          <div class="play-progress">
            <div class="play-progress__label">
              <span>진도율</span>
              <span id="play-progress-text">0%</span>
            </div>
            <div class="play-progress__bar">
              <div class="play-progress__fill" id="play-progress-fill" style="width:0%"></div>
            </div>
          </div>
        </div>

        <!-- 에피소드 목록 -->
        <div class="play-episodes">
          <h3 class="play-episodes__title" id="play-ep-title">커리큘럼</h3>
          <ul class="play-ep-list" id="play-ep-list"></ul>
        </div>
      </div>
    </div>
  </main>

  <footer class="linear-footer"></footer>

  <script type="module">
    import { auth, db } from './js/core/firebase-core.js';
    import { isAdmin } from './js/auth/auth-utils.js';
    import {
      doc, getDoc, collection, query, where, orderBy, getDocs, setDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const episodeParam = urlParams.get('ep'); // 특정 에피소드로 바로 접근

    if (!productId) {
      showDenied();
    }

    let episodes = [];
    let currentEpIndex = 0;
    let vimeoPlayer = null;

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        alert('로그인이 필요합니다.');
        window.location.href = 'login.html';
        return;
      }

      try {
        // 구매 확인
        let purchased = false;

        // 직접 구매
        const purchaseSnap = await getDoc(doc(db, 'purchases', `${user.uid}_${productId}`));
        if (purchaseSnap.exists() && purchaseSnap.data().status === 'completed') {
          purchased = true;
        }

        // 패키지로 구매
        if (!purchased) {
          const bundlesSnap = await getDocs(query(
            collection(db, 'products'),
            where('type', '==', 'bundle'),
            where('isActive', '==', true)
          ));
          for (const bd of bundlesSnap.docs) {
            const bData = bd.data();
            if (bData.includedProducts && bData.includedProducts.includes(productId)) {
              const bPurchase = await getDoc(doc(db, 'purchases', `${user.uid}_${bd.id}`));
              if (bPurchase.exists() && bPurchase.data().status === 'completed') {
                purchased = true;
                break;
              }
            }
          }
        }

        // 관리자
        if (isAdmin(user)) purchased = true;

        if (!purchased) {
          // 미구매 — isFree 에피소드만 허용
          await loadEpisodesAndCheckFree();
          return;
        }

        // 구매 확인됨
        await loadAndPlay();

      } catch (error) {
        console.error('접근 확인 오류:', error);
        showDenied();
      }
    });

    // 에피소드 로드 (미구매 시 — isFree만 재생 가능)
    async function loadEpisodesAndCheckFree() {
      episodes = await fetchEpisodes();

      if (episodeParam) {
        const targetEp = episodes.find(e => String(e.episode) === episodeParam);
        if (targetEp && targetEp.isFree) {
          currentEpIndex = episodes.indexOf(targetEp);
          await loadAndPlay(true); // freeOnly 모드
          return;
        }
      }

      // 1강이 무료인지 확인
      const freeEp = episodes.find(e => e.isFree);
      if (freeEp) {
        currentEpIndex = episodes.indexOf(freeEp);
        await loadAndPlay(true);
        return;
      }

      showDenied();
    }

    // 에피소드 목록 가져오기
    async function fetchEpisodes() {
      const epQuery = query(
        collection(db, 'episodes'),
        where('productId', '==', productId),
        orderBy('sortOrder', 'asc')
      );
      const epSnap = await getDocs(epQuery);
      return epSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // 상품 정보 + 에피소드 로드 후 재생
    async function loadAndPlay(freeOnly = false) {
      // 상품 정보
      const productSnap = await getDoc(doc(db, 'products', productId));
      const product = productSnap.exists() ? productSnap.data() : { title: '강의' };

      // 에피소드
      if (!episodes.length) {
        episodes = await fetchEpisodes();
      }

      if (!episodes.length) {
        // 에피소드 없는 경우 (단일 영상 — legacy 호환)
        if (product.vimeoId) {
          episodes = [{ episode: 1, title: product.title, vimeoId: product.vimeoId, duration: product.totalDuration || '' }];
        } else {
          alert('재생할 강의가 없습니다.');
          window.location.href = 'index.html#lecture-tab';
          return;
        }
      }

      // 에피소드 파라미터가 있으면 해당 에피소드로
      if (episodeParam) {
        const idx = episodes.findIndex(e => String(e.episode) === episodeParam);
        if (idx >= 0) currentEpIndex = idx;
      }

      // UI 표시
      document.getElementById('play-loading').style.display = 'none';
      document.getElementById('play-content').style.display = 'block';

      document.getElementById('play-title').textContent = product.title;
      document.getElementById('play-back-link').href = `product-detail.html?id=${productId}`;
      document.getElementById('play-ep-title').textContent = `커리큘럼 (${episodes.length}강)`;

      // 에피소드 목록 렌더
      renderEpisodeList(freeOnly);

      // 첫 에피소드 재생
      playEpisode(currentEpIndex);
    }

    // 에피소드 목록 렌더링
    function renderEpisodeList(freeOnly = false) {
      const listEl = document.getElementById('play-ep-list');
      listEl.innerHTML = episodes.map((ep, i) => {
        const locked = freeOnly && !ep.isFree;
        const activeClass = i === currentEpIndex ? 'active' : '';
        const lockIcon = locked ? '<span style="color:#dee2e6;font-size:14px;">🔒</span>' : '';
        const freeTag = ep.isFree ? '<span style="font-size:11px;color:#059669;font-weight:700;">무료</span>' : '';

        return `
          <li class="play-ep-item ${activeClass}" data-index="${i}" ${locked ? 'data-locked="true"' : ''}>
            <div class="play-ep-item__num">${ep.episode}</div>
            <div class="play-ep-item__info">
              <div class="play-ep-item__title">${ep.title}</div>
              <div class="play-ep-item__duration">${ep.duration || ''}</div>
            </div>
            ${i === currentEpIndex ? '<span class="play-ep-item__playing">재생중</span>' : ''}
            ${freeTag}
            ${lockIcon}
          </li>
        `;
      }).join('');

      // 클릭 이벤트
      listEl.querySelectorAll('.play-ep-item').forEach(item => {
        item.addEventListener('click', () => {
          if (item.dataset.locked === 'true') {
            alert('이 강의를 시청하려면 구매가 필요합니다.');
            return;
          }
          const idx = parseInt(item.dataset.index);
          if (idx !== currentEpIndex) {
            currentEpIndex = idx;
            playEpisode(idx);
            renderEpisodeList(freeOnly);
          }
        });
      });
    }

    // 에피소드 재생
    function playEpisode(index) {
      const ep = episodes[index];
      if (!ep || !ep.vimeoId) return;

      const container = document.getElementById('video-container');
      container.innerHTML = '';

      // 에피소드 정보 업데이트
      document.getElementById('play-episode-info').textContent =
        `${ep.episode}강: ${ep.title}${ep.duration ? ' · ' + ep.duration : ''}`;

      // 진도율 초기화
      document.getElementById('play-progress-fill').style.width = '0%';
      document.getElementById('play-progress-text').textContent = '0%';

      // Vimeo iframe
      const iframe = document.createElement('iframe');
      iframe.src = `https://player.vimeo.com/video/${ep.vimeoId}`;
      iframe.allow = 'autoplay; fullscreen; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.id = 'vimeo-player';
      container.appendChild(iframe);

      // Vimeo Player API
      if (vimeoPlayer) {
        vimeoPlayer.destroy().catch(() => {});
      }
      vimeoPlayer = new Vimeo.Player(iframe);

      vimeoPlayer.on('timeupdate', (data) => {
        const percent = Math.round(data.percent * 100);
        document.getElementById('play-progress-fill').style.width = percent + '%';
        document.getElementById('play-progress-text').textContent = percent + '%';

        // 10초마다 진도율 저장
        if (Math.floor(data.seconds) % 10 === 0) {
          saveProgress(ep, percent);
        }
      });

      // 페이지 타이틀 업데이트
      document.title = `${ep.episode}강 ${ep.title} | 퍼스트펭귄`;
    }

    // 진도율 저장
    async function saveProgress(ep, percent) {
      const user = auth.currentUser;
      if (!user) return;

      try {
        const progressId = `${user.uid}_${productId}_ep${ep.episode}`;
        await setDoc(doc(db, 'lectureProgress', progressId), {
          userId: user.uid,
          productId: productId,
          episodeId: ep.id || `${productId}_ep${String(ep.episode).padStart(2, '0')}`,
          episode: ep.episode,
          episodeTitle: ep.title,
          progress: percent,
          lastWatched: serverTimestamp()
        }, { merge: true });
      } catch (error) {
        console.error('진도율 저장 오류:', error);
      }
    }

    function showDenied() {
      document.getElementById('play-loading').style.display = 'none';
      document.getElementById('play-denied').style.display = 'block';
      if (productId) {
        document.getElementById('play-denied-btn').href = `product-detail.html?id=${productId}`;
      }
    }
  </script>
</body>
</html>
