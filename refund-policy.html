<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환불 정책 | 퍼스트펭귄</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, var(--penguin-navy) 0%, var(--penguin-skyblue) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 60px 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 {
      color: var(--penguin-navy);
      font-size: 26px;
      margin-bottom: 16px;
    }
    p {
      color: #555;
      line-height: 1.8;
      font-size: 15px;
      margin-bottom: 12px;
    }
    .note {
      margin-top: 28px;
      background: #f1f5ff;
      border-left: 4px solid var(--penguin-skyblue);
      border-radius: 8px;
      padding: 16px 20px;
      text-align: left;
      font-size: 14px;
      color: #444;
      line-height: 1.7;
    }
    .note strong { color: var(--penguin-navy); }
    .back-btn {
      display: inline-block;
      margin-top: 36px;
      padding: 14px 36px;
      background: var(--penguin-navy);
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--penguin-skyblue); }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📋</div>
    <h1>환불 정책</h1>
    <p>현재 퍼스트펭귄의 모든 서비스는 <strong>무료</strong>로 제공되고 있습니다.</p>
    <p>유료 상품 출시 시 환불 정책이 이 페이지에 안내될 예정입니다.</p>
    <div class="note">
      <strong>문의</strong><br>
      서비스 이용 중 불편한 점이 있으시면 아래로 연락주세요.<br>
      이메일: the1stpeng@gmail.com
    </div>
    <a href="/" class="back-btn">홈으로 돌아가기</a>
  </div>
</body>
</html>
