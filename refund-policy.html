<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환불 정책 | 퍼스트펭귄</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, var(--penguin-navy) 0%, var(--penguin-skyblue) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 60px 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 24px; }
    h1 {
      color: var(--penguin-navy);
      font-size: 26px;
      margin-bottom: 16px;
    }
    p {
      color: #555;
      line-height: 1.8;
      font-size: 15px;
      margin-bottom: 12px;
    }
    .note {
      margin-top: 28px;
      background: #f1f5ff;
      border-left: 4px solid var(--penguin-skyblue);
      border-radius: 8px;
      padding: 16px 20px;
      text-align: left;
      font-size: 14px;
      color: #444;
      line-height: 1.7;
    }
    .note strong { color: var(--penguin-navy); }
    .back-btn {
      display: inline-block;
      margin-top: 36px;
      padding: 14px 36px;
      background: var(--penguin-navy);
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--penguin-skyblue); }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📋</div>
    <h1>환불 정책</h1>
    <p>기출문제 풀기, 학습 분석 등 <strong>본 사이트의 모든 기능은 무료</strong>로 제공됩니다.</p>
    <p>강의 및 요약본은 외부 플랫폼을 통해 판매되며, 해당 구매에 대한 환불 문의는 아래로 연락주시면 안내해드립니다.</p>
    <a href="https://litt.ly/the1stpeng" target="_blank" rel="noopener noreferrer" style="display:inline-block;margin:12px 0;padding:10px 24px;background:var(--penguin-skyblue);color:white;text-decoration:none;border-radius:999px;font-weight:600;font-size:14px;">강의 · 요약본 보러가기</a>
    <div class="note">
      <strong>환불 문의</strong><br>
      이메일: the1stpeng@gmail.com<br>
      운영시간: 평일 09:00 ~ 18:00
    </div>
    <a href="/" class="back-btn">홈으로 돌아가기</a>
  </div>
</body>
</html>
